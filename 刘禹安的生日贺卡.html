<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>生日贺卡 · 刘禹安</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at 40% 50%, #0e1125, #020617);
      position: relative;
      transform: translateZ(0);
      backface-visibility: hidden;
      touch-action: manipulation;
    }
    /* 背景散景光斑 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 28% 32%, rgba(130, 90, 190, 0.13) 0%, transparent 50%),
        radial-gradient(circle at 72% 58%, rgba(255, 145, 85, 0.09) 0%, transparent 48%),
        radial-gradient(circle at 48% 52%, rgba(255, 255, 255, 0.04) 0%, transparent 68%),
        radial-gradient(circle at 60% 25%, rgba(180, 140, 220, 0.06) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .star-layer { z-index: 1; }
    .envelope-layer { z-index: 10; }
    .letter-layer { z-index: 12; }
    .star-scene { z-index: 5; }
    .message-layer { z-index: 16; }
    .cake-morph-layer { z-index: 21; }
    .cake-layer { z-index: 22; }
    .birthday-cheer { z-index: 35; }
    .signature { z-index: 50; }

    /* ========== 首页入口 ========== */
    .home-page {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(5, 5, 20, 0.55);
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    .home-page.hidden { opacity: 0;
      visibility: hidden;
      pointer-events: none; }
    .open-btn {
      padding: 18px 56px;
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff9ef;
      background: linear-gradient(135deg, #c49a7c, #e8b896);
      border: none;
      border-radius: 80px;
      cursor: pointer;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.55), 0 0 32px rgba(255, 210, 150, 0.65);
      letter-spacing: 6px;
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.35s;
      position: relative;
      overflow: hidden;
      will-change: transform;
    }
    .open-btn::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 82px;
      background: linear-gradient(135deg, #d4a88c, #f0c8a0, #c49a7c);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.35s;
    }
    .open-btn:hover { transform: scale(1.06);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.65), 0 0 55px #ffcd94; }
    .open-btn:hover::after { opacity: 1; }
    .open-btn:active { transform: scale(0.96);
      transition: transform 0.1s; }

    /* ========== 3D信封层 – 强化光影与立体感 ========== */
    .envelope-layer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: min(360px, 82vw);
      aspect-ratio: 360/250;
      opacity: 0;
      visibility: hidden;
      transition: transform 0.8s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.55s;
      filter: drop-shadow(0 0 14px rgba(150, 110, 220, 0.5)) drop-shadow(0 22px 32px rgba(0, 0, 0, 0.45));
      will-change: transform, opacity;
    }
    .envelope-layer.show { transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      visibility: visible; }
    /* 悬停：信封放大 + 锁扣高亮 + 翻盖微抬 */
    .envelope-layer:hover {
      transform: translate(-50%, -50%) scale(1.04);
      filter: drop-shadow(0 0 30px rgba(210, 150, 240, 0.7)) drop-shadow(0 26px 38px rgba(0, 0, 0, 0.55));
      transition: transform 0.3s ease, filter 0.3s;
    }
    .envelope-layer:hover .envelope-seal:not(.bouncing) {
      filter: brightness(1.25) drop-shadow(0 0 10px gold);
      box-shadow: 0 0 18px #fbe6a0, 0 7px 18px rgba(0, 0, 0, 0.45), inset 0 2px 6px rgba(255, 248, 200, 0.95);
    }
    .envelope-layer:hover .envelope-seal:not(.bouncing)::before {
      text-shadow: 0 0 10px #ffdb70, 0 0 18px #ffb300;
    }
    .envelope-layer:hover .envelope-flap:not(.open) {
      transform: translateY(-4px) rotateX(0deg);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.38), inset 0 -1px 3px rgba(0, 0, 0, 0.06);
      transition: transform 0.35s ease, box-shadow 0.35s;
    }
    /* 底部柔光氛围 */
    .envelope-layer::before {
      content: '';
      position: absolute;
      top: -8px;
      left: -8px;
      right: -8px;
      bottom: -8px;
      background: linear-gradient(135deg, rgba(180, 130, 255, 0.38), rgba(255, 180, 120, 0.28));
      border-radius: 36px;
      z-index: -1;
      filter: blur(16px);
      opacity: 0.5;
      pointer-events: none;
      transition: opacity 0.45s;
    }
    .envelope-layer:hover::before { opacity: 0.9; }

    .envelope {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 1600px;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    /* 信封主体 – 厚度 + 投影 */
    .envelope-body {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80%;
      background: linear-gradient(160deg, #fef6ea 0%, #fce9d9 40%, #f8dfc8 100%);
      border-radius: 0 0 28px 28px;
      box-shadow:
        inset 0 2px 6px rgba(255, 255, 255, 0.75),
        inset 0 -8px 0 #d4b896,
        0 20px 38px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      background-image:
        repeating-linear-gradient(45deg, rgba(210, 180, 145, 0.06) 0px, rgba(210, 180, 145, 0.06) 2px, transparent 2px, transparent 10px),
        radial-gradient(ellipse at 35% 22%, rgba(255, 255, 255, 0.38) 0%, transparent 58%);
      contain: layout style paint;
    }
    .envelope-body::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 8px;
      right: 8px;
      height: 16px;
      background: rgba(80, 50, 30, 0.38);
      filter: blur(8px);
      border-radius: 50%;
      z-index: -1;
    }

    /* 翻盖 – 立体翻折 */
    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(150deg, #fef3e6 0%, #fbe9d5 45%, #f3d4b8 100%);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top center;
      transition: transform 1.45s cubic-bezier(0.4, 0, 0.2, 1);
      backface-visibility: hidden;
      z-index: 3;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.32), inset 0 -2px 5px rgba(0, 0, 0, 0.1);
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
      will-change: transform;
      contain: layout style paint;
    }
    /* 翻盖边缘高光折痕 */
    .envelope-flap::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 68%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #fefaf4, #d9c3a5, transparent);
      box-shadow: 0 1px 4px rgba(255, 255, 255, 0.7);
    }
    .envelope-flap.open {
      transform: rotateX(180deg);
      box-shadow: 0 -12px 24px rgba(0, 0, 0, 0.22), inset 0 3px 6px rgba(0, 0, 0, 0.12);
    }

    /* 信封内衬 */
    .envelope-inner {
      position: absolute;
      top: 10%;
      left: 4%;
      right: 4%;
      height: 65%;
      background: #fffaf3;
      border-radius: 15px;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.55s ease 0.9s, text-shadow 0.5s ease 1.2s;
      box-shadow: inset 0 1px 6px rgba(100, 70, 40, 0.08), 0 6px 16px rgba(0, 0, 0, 0.14);
      background-image: radial-gradient(circle at 25% 40%, rgba(230, 200, 160, 0.18) 1px, transparent 1px);
      background-size: 13px 13px;
      padding: 12px 10px;
      text-align: center;
      color: #aa7a55;
      font-size: clamp(0.8rem, 3vw, 0.95rem);
      line-height: 1.65;
      display: flex;
      flex-direction: column;
      justify-content: center;
      pointer-events: none;
    }
    .envelope-flap.open+.envelope-inner {
      opacity: 1;
      text-shadow: 0 0 6px rgba(255, 220, 150, 0.4);
    }

    /* 锁扣 – 金属浮雕质感 */
    .envelope-seal {
      position: absolute;
      bottom: 33%;
      left: 50%;
      transform: translateX(-50%);
      width: 14%;
      aspect-ratio: 1/1;
      max-width: 54px;
      background: radial-gradient(circle at 42% 32%, #f5e6c4, #d4a870);
      border-radius: 50%;
      z-index: 4;
      box-shadow:
        0 7px 16px rgba(0, 0, 0, 0.52),
        inset 0 -3px 7px rgba(0, 0, 0, 0.28),
        inset 0 3px 9px rgba(255, 255, 240, 0.85);
      border: 2px solid #e9cfa0;
      transition: transform 0.45s ease 0.9s, opacity 0.4s ease 0.9s, filter 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1rem, 5vw, 1.5rem);
      color: #fbe8a5;
      text-shadow: 0 1px 3px #7b5530;
      will-change: transform, opacity;
    }
    .envelope-seal::before { content: "★"; }
    /* 锁扣投影到信封上 */
    .envelope-seal::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 65%;
      height: 9px;
      background: rgba(0, 0, 0, 0.32);
      filter: blur(5px);
      border-radius: 50%;
      z-index: -1;
      transition: opacity 0.3s ease 0.9s;
    }
    /* 锁扣弹跳动画 */
    @keyframes sealBounce {
      0% { transform: translateX(-50%) scale(1); }
      35% { transform: translateX(-50%) scale(1.18); }
      65% { transform: translateX(-50%) scale(0.92); }
      100% { transform: translateX(-50%) scale(1); }
    }
    .envelope-seal.bouncing {
      animation: sealBounce 0.4s ease-out;
    }
    /* 锁扣消失（翻盖打开后） */
    .envelope-flap.open~.envelope-seal {
      transform: translateX(-50%) scale(0) rotate(360deg);
      opacity: 0;
    }
    .envelope-flap.open~.envelope-seal::after {
      opacity: 0;
    }

    /* 点击震动 */
    @keyframes envelopeShake {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      25% { transform: translate(-50%, -50%) scale(0.97) rotate(-0.6deg); }
      75% { transform: translate(-50%, -50%) scale(0.97) rotate(0.6deg); }
    }
    .envelope-layer.shake {
      animation: envelopeShake 0.35s ease-out;
    }

    /* ========== 信纸层 ========== */
    .letter-layer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      width: min(320px, 78vw);
      aspect-ratio: 320/240;
      opacity: 0;
      visibility: hidden;
      z-index: 12;
      pointer-events: none;
      will-change: transform, opacity, top;
    }
    .letter-layer.show {
      opacity: 1;
      visibility: visible;
      animation: letterRise 3.4s forwards cubic-bezier(0.22, 0.9, 0.32, 1.15);
    }
    @keyframes letterRise {
      0% { top: 50%;
        transform: translate(-50%, -50%) scale(0.82);
        opacity: 0;
        filter: blur(1.5px); }
      16% { opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: blur(0); }
      76% { opacity: 1;
        top: 24%;
        transform: translate(-50%, -50%) rotate(-1.8deg); }
      100% { top: 18%;
        opacity: 0;
        transform: translate(-50%, -50%) rotate(0deg) scale(1.04);
        visibility: hidden; }
    }
    .letter {
      width: 100%;
      height: 100%;
      background: linear-gradient(150deg, #fffdf6, #fff4e5);
      border-radius: 22px;
      padding: 8%;
      box-shadow: 0 22px 42px rgba(0, 0, 0, 0.38), inset 0 2px 5px white;
      border: 1px solid #ffe3b8;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .letter p {
      font-size: clamp(0.9rem, 4vw, 1.05rem);
      color: #aa7a55;
      line-height: 1.9;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .letter-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, #e6bf8c, transparent);
      margin: 12px 0;
    }

    /* ========== 星空场景 ========== */
    .star-scene {
      position: fixed;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1.8s ease;
      z-index: 5;
      pointer-events: none;
    }
    .star-scene.show { opacity: 1;
      visibility: visible; }
    .star-layer { position: absolute;
      width: 100%;
      height: 100%; }
    .star-big,
    .star-small {
      position: absolute;
      background: #fff5e0;
      border-radius: 50%;
      will-change: opacity, transform;
    }
    .star-big {
      width: 3px;
      height: 3px;
      box-shadow: 0 0 7px #ffdd99;
      animation: twinkleBig 4s infinite;
    }
    .star-small {
      width: 2px;
      height: 2px;
      animation: twinkleSmall 2.8s infinite;
    }
    @keyframes twinkleBig { 0%, 100% { opacity: 0.4;
        transform: scale(1); } 50% { opacity: 1;
        transform: scale(1.35); } }
    @keyframes twinkleSmall { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
    .meteor {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #ffefc0;
      border-radius: 50%;
      opacity: 0;
      transform: rotate(-30deg);
    }
    .meteor::after {
      content: '';
      position: absolute;
      width: 90px;
      height: 2px;
      background: linear-gradient(90deg, #ffe2a3, transparent);
      top: 0;
      left: 0;
      transform: translateX(-100%);
    }
    @keyframes meteorFall { 0% { opacity: 0;
        transform: rotate(-30deg) translate(0, 0); } 15% { opacity: 1; } 100% { opacity: 0;
        transform: rotate(-30deg) translate(-450px, 450px); } }

    /* ========== 祝福文字层 ========== */
    .message-layer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 16;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1s ease 0.3s;
      width: 88%;
      max-width: 700px;
      pointer-events: none;
    }
    .message-layer.show { opacity: 1;
      visibility: visible;
      pointer-events: auto; }
    .main-title {
      font-size: clamp(1.8rem, 8vw, 4rem);
      color: #fff3e8;
      text-shadow: 0 0 22px #ffbc7a, 0 0 48px #ff9f44;
      letter-spacing: 5px;
      margin-bottom: 18px;
      animation: titleGlow 2.6s infinite;
    }
    @keyframes titleGlow { 0%, 100% { text-shadow: 0 0 16px #ffb66b, 0 0 32px #ffa54d; } 50% { text-shadow: 0 0 30px #ffdaa5,
        0 0 60px #ffb347; } }
    .blessing-text {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      color: #fff7ec;
      line-height: 1.8;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      display: inline-block;
      padding: 14px 30px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .claim-btn {
      margin-top: 42px;
      padding: 14px 50px;
      font-size: 1.15rem;
      font-weight: bold;
      background: linear-gradient(145deg, #c47b9b, #e89f6e);
      border: none;
      border-radius: 60px;
      color: #fff3e4;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45), 0 0 22px rgba(255, 160, 100, 0.4);
      transition: transform 0.3s, box-shadow 0.3s;
      pointer-events: auto;
    }
    .claim-btn:hover { transform: scale(1.05);
      box-shadow: 0 0 32px #ffaa70; }
    .claim-btn.disabled { pointer-events: none;
      opacity: 0.5;
      filter: grayscale(20%); }

    /* ========== Canvas粒子层 ========== */
    #particleCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #particleCanvas.active { opacity: 1; }

    /* ========== 过渡蛋糕层 ========== */
    .cake-morph-layer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: min(240px, 58vw);
      aspect-ratio: 240/280;
      z-index: 21;
      opacity: 0;
      visibility: hidden;
      transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.35s;
      pointer-events: none;
      will-change: transform, opacity;
    }
    .cake-morph-layer.show { transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      visibility: visible; }
    .morph-cake {
      width: 100%;
      height: 100%;
      background: rgba(6, 18, 16, 0.92);
      border: 2.5px solid #55ffaa;
      border-radius: 32px;
      box-shadow: 0 0 48px #33ff99, inset 0 0 20px rgba(102, 255, 170, 0.22);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 7%;
      backdrop-filter: blur(6px);
      will-change: transform, opacity;
    }
    .morph-tier {
      width: 90%;
      height: 12%;
      margin-bottom: 3%;
      background: rgba(100, 255, 150, 0.2);
      border: 1.5px solid #5affa0;
      box-shadow: 0 0 12px #2eff8c;
      border-radius: 5px;
      transition: background 0.3s, border-color 0.3s;
    }
    .morph-tier:nth-child(1) { width: 94%;
      height: 14%; }
    .morph-tier:nth-child(2) { width: 79%;
      height: 11%; }
    .morph-tier:nth-child(3) { width: 63%;
      height: 10%; }
    .morph-candle {
      width: 5%;
      height: 18%;
      background: #d0ffbc;
      border: 1.5px solid #5eff8c;
      margin-top: 4%;
      box-shadow: 0 0 14px #33ff99;
      border-radius: 5px;
      transition: background 0.3s, border-color 0.3s;
    }
    @keyframes morphShrink {
      0% { transform: scale(1);
        opacity: 1;
        filter: brightness(1) hue-rotate(0deg); }
      100% { transform: scale(0.68);
        opacity: 0;
        filter: brightness(2.2) hue-rotate(55deg); }
    }
    .cake-morph-layer.show .morph-cake { animation: morphShrink 1.05s ease-out forwards; }

    /* ========== 最终真实蛋糕 ========== */
    .cake-layer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 22;
      opacity: 0;
      visibility: hidden;
      transition: transform 0.8s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.5s;
      pointer-events: none;
      will-change: transform, opacity;
    }
    .cake-layer.show { transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      visibility: visible; }
    .cake-container {
      position: relative;
      width: min(280px, 68vw);
      aspect-ratio: 280/320;
      contain: layout style paint;
    }
    .cake-tier1,
    .cake-tier2,
    .cake-tier3 {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      contain: layout style paint;
    }
    .cake-tier1 {
      bottom: 0;
      width: 88%;
      height: 28%;
      background: linear-gradient(155deg, #ff8c5a, #e3602e);
      border-radius: 20px 20px 34px 34px;
      box-shadow: inset 0 -9px 0 #b23b10, 0 14px 28px rgba(0, 0, 0, 0.42);
    }
    .cake-tier2 {
      bottom: 27%;
      width: 74%;
      height: 24%;
      background: linear-gradient(155deg, #ffe4a5, #f7c56e);
      border-radius: 18px;
      box-shadow: inset 0 -7px 0 #d49b3a, 0 10px 20px rgba(0, 0, 0, 0.34);
    }
    .cake-tier3 {
      bottom: 50%;
      width: 58%;
      height: 21%;
      background: linear-gradient(155deg, #ffc8e4, #f290b8);
      border-radius: 16px;
      box-shadow: inset 0 -6px 0 #bb5580;
    }
    /* 蛋糕顶部名字 */
    .cake-top-msg {
      position: absolute;
      bottom: 72%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 5;
      white-space: nowrap;
      pointer-events: none;
    }
    .cake-top-msg span {
      display: block;
      font-size: clamp(0.7rem, 3.5vw, 0.95rem);
      font-weight: 700;
      color: #fffde8;
      text-shadow: 0 0 10px #ffaa44, 0 0 22px #ff8800;
      letter-spacing: 2px;
      animation: nameGlow 1.8s ease-in-out infinite alternate;
    }
    .cake-top-msg span:last-child {
      font-size: clamp(0.6rem, 3vw, 0.8rem);
      margin-top: 1px;
    }
    @keyframes nameGlow {
      from { text-shadow: 0 0 8px #ffaa44, 0 0 18px #ff8800; }
      to { text-shadow: 0 0 16px #ffcc77, 0 0 32px #ff9900, 0 0 48px #ff6600; }
    }
    /* 奶油装饰 */
    .cream {
      position: absolute;
      width: 8%;
      aspect-ratio: 1/1;
      background: #fffae9;
      border-radius: 50%;
      box-shadow: 0 3px 7px rgba(0, 0, 0, 0.22);
    }
    .cream-1 { bottom: 54%;
      left: calc(50% - 29% + 3%); }
    .cream-2 { bottom: 54%;
      left: 50%;
      transform: translateX(-50%); }
    .cream-3 { bottom: 54%;
      right: calc(50% - 29% + 3%); }
    .cream-4 { bottom: 31%;
      left: calc(50% - 37% + 4%); }
    .cream-5 { bottom: 31%;
      left: 50%;
      transform: translateX(-50%); }
    .cream-6 { bottom: 31%;
      right: calc(50% - 37% + 4%); }
    .cream-7 { bottom: 6%;
      left: calc(50% - 44% + 5%); }
    .cream-8 { bottom: 6%;
      left: 50%;
      transform: translateX(-50%); }
    .cream-9 { bottom: 6%;
      right: calc(50% - 44% + 5%); }
    /* 蜡烛 */
    .candle-stick {
      position: absolute;
      bottom: 74%;
      left: 50%;
      transform: translateX(-50%);
      width: 5%;
      height: 16%;
      background: linear-gradient(90deg, #ff7790, #e8436e);
      border-radius: 8px;
      box-shadow: 0 7px 14px rgba(0, 0, 0, 0.32);
      z-index: 3;
    }
    .flame {
      position: absolute;
      top: -28%;
      left: 50%;
      transform: translateX(-50%);
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 35%, #fff8c4 0%, #ffdd77 25%, #ffaa33 60%, #ff6600 100%);
      border-radius: 55% 45% 55% 45% / 65% 60% 40% 35%;
      animation: flicker 0.14s infinite alternate;
      box-shadow: 0 0 28px #ffae55, 0 0 55px rgba(255, 170, 60, 0.55), 0 0 85px rgba(255, 140, 30, 0.2);
      z-index: 4;
    }
    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1) rotate(-2.5deg);
        opacity: 0.88; }
      100% { transform: translateX(-50%) scale(0.9) rotate(2.5deg);
        opacity: 1; }
    }
    /* 星光点缀 */
    .sparkle {
      position: absolute;
      width: 3%;
      aspect-ratio: 1/1;
      background: gold;
      border-radius: 50%;
      animation: sparkGlow 2s infinite;
      z-index: 4;
      pointer-events: none;
    }
    @keyframes sparkGlow {
      0%, 100% { opacity: 0.3;
        transform: scale(1); }
      50% { opacity: 1;
        transform: scale(1.7); }
    }
    .sparkle1 { top: 38%;
      left: 10%; }
    .sparkle2 { top: 28%;
      right: 14%;
      animation-delay: 0.6s; }
    .sparkle3 { top: 60%;
      left: 16%;
      animation-delay: 1.2s; }
    .sparkle4 { top: 52%;
      right: 20%;
      animation-delay: 1.5s; }
    .sparkle5 { top: 20%;
      left: 22%;
      animation-delay: 0.3s; }
    .sparkle6 { top: 45%;
      right: 8%;
      animation-delay: 1.8s; }

    /* 飘落纸屑 */
    .confetti {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      animation: confettiFall linear forwards;
      opacity: 0;
    }
    @keyframes confettiFall {
      0% { opacity: 0;
        transform: translateY(-40px) rotate(0deg) scale(0.5); }
      10% { opacity: 1;
        transform: translateY(-20px) rotate(45deg) scale(1); }
      90% { opacity: 0.8;
        transform: translateY(260px) rotate(540deg) scale(0.7); }
      100% { opacity: 0;
        transform: translateY(300px) rotate(720deg) scale(0.3); }
    }
    .confetti-1 { top: 5%;
      left: 10%;
      width: 8px;
      height: 8px;
      background: #ff6b6b;
      border-radius: 2px;
      animation-duration: 3.2s;
      animation-delay: 0.2s; }
    .confetti-2 { top: 2%;
      left: 30%;
      width: 6px;
      height: 6px;
      background: #ffd93d;
      border-radius: 50%;
      animation-duration: 3.6s;
      animation-delay: 0.5s; }
    .confetti-3 { top: 8%;
      left: 55%;
      width: 7px;
      height: 3px;
      background: #6bcb77;
      border-radius: 1px;
      animation-duration: 2.9s;
      animation-delay: 0.8s; }
    .confetti-4 { top: 3%;
      left: 72%;
      width: 5px;
      height: 5px;
      background: #ff8fab;
      border-radius: 50%;
      animation-duration: 3.4s;
      animation-delay: 1.1s; }
    .confetti-5 { top: 6%;
      left: 85%;
      width: 8px;
      height: 4px;
      background: #ffeaa7;
      border-radius: 1px;
      animation-duration: 3.0s;
      animation-delay: 0.4s; }
    .confetti-6 { top: 1%;
      left: 18%;
      width: 6px;
      height: 6px;
      background: #a29bfe;
      border-radius: 50%;
      animation-duration: 3.8s;
      animation-delay: 1.4s; }
    .confetti-7 { top: 4%;
      left: 45%;
      width: 7px;
      height: 7px;
      background: #fd79a8;
      border-radius: 2px;
      animation-duration: 3.3s;
      animation-delay: 0.7s; }
    .confetti-8 { top: 7%;
      left: 65%;
      width: 5px;
      height: 5px;
      background: #ffeaa7;
      border-radius: 50%;
      animation-duration: 3.1s;
      animation-delay: 1.6s; }

    /* ========== 生日快乐大字层 ========== */
    .birthday-cheer {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      text-align: center;
      z-index: 35;
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.4s;
      pointer-events: none;

    }
    .birthday-cheer.show { transform: translate(-50%, -50%) scale(1);
      opacity: 1; }
    .cheer-text {
      font-size: clamp(1.8rem, 7vw, 3.8rem);
      font-weight: 800;
      color: #fff9c4;
      text-shadow: 0 0 22px #ff4081, 0 0 48px #ff9800, 0 0 80px #ffeb3b;
      letter-spacing: 4px;
      animation: cheerPulse 0.7s ease-in-out infinite alternate;
      white-space: nowrap;
    }
    @keyframes cheerPulse {
      from { text-shadow: 0 0 16px #ff4081, 0 0 32px #ff9800;
        transform: scale(0.97); }
      to { text-shadow: 0 0 38px #ff4081, 0 0 75px #ff9800, 0 0 110px #ffeb3b;
        transform: scale(1.06); }
    }

    /* ========== 落款 ========== */
    .signature {
      position: fixed;
      bottom: 22px;
      right: 22px;
      font-size: clamp(0.75rem, 3vw, 1rem);
      color: #ffe6c7;
      letter-spacing: 3px;
      background: rgba(0, 0, 0, 0.35);
      padding: 5px 16px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      z-index: 50;
      pointer-events: none;

    }

    /* ========== 响应式适配 ========== */
    @media (max-width: 768px) {
      .envelope-layer { width: min(300px, 78vw); }
      .envelope-seal { max-width: 44px; }
      .letter-layer { width: min(260px, 72vw); }
      .cake-container { width: min(230px, 62vw); }
      .cake-morph-layer { width: min(200px, 52vw); }
      .confetti-1,
      .confetti-2,
      .confetti-3,
      .confetti-4,
      .confetti-5,
      .confetti-6,
      .confetti-7,
      .confetti-8 { width: 5px;
        height: 5px; }
      .confetti-1,
      .confetti-5,

    }
    @media (max-width: 480px) {
      .open-btn { padding: 14px 36px;
        font-size: 1.15rem;
        letter-spacing: 4px; }
      .envelope-layer { width: min(250px, 74vw); }
      .envelope-seal { max-width: 36px;
        font-size: 0.85rem; }
      .letter-layer { width: min(220px, 68vw); }
      .cake-container { width: min(180px, 58vw); }

        font-size: clamp(1.4rem, 5.5vw, 2.2rem); }
      .confetti-1,
      .confetti-2,
      .confetti-3,
      .confetti-4,
      .confetti-5,
      .confetti-6,
      .confetti-7,
      .confetti-8 { width: 4px;
        height: 4px; }
      .confetti-1,
      .confetti-5,
      .confetti-7 { height: 2px; }
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas" aria-hidden="true"></canvas>

  <!-- 首页入口 -->
  <div class="home-page" id="homePage">
    <button class="open-btn" id="openBtn">✨ 开启生日贺卡 ✨</button>

  <!-- 祝福文字 -->
  <div class="message-layer" id="messageLayer">
    <h1 class="main-title">生日快乐 刘禹安</h1>
    <p class="blessing-text">🌠 愿历遍山河 人间值得 🌠<br>岁岁常欢愉，年年皆胜意<br>永远赤诚，永远自由</p>
    <button class="claim-btn" id="claimBtn">🎂 领取魔法蛋糕 🎂</button>
  </div>

  <!-- 过渡蛋糕 -->
  <div class="cake-morph-layer" id="cakeMorphLayer">
    <div class="morph-cake">
      <div class="morph-tier"></div><div class="morph-tier"></div><div class="morph-tier"></div>
      <div class="morph-candle"></div>
    </div>
  </div>

  <!-- 真实蛋糕 -->
  <div class="cake-layer" id="cakeLayer">
    <div class="cake-container">
      <div class="cake-tier1"></div><div class="cake-tier2"></div><div class="cake-tier3"></div>
      <div class="cake-top-msg"><span>🎂 祝刘禹安 🎂</span><span>生日快乐！</span></div>
      <div class="cream cream-1"></div><div class="cream cream-2"></div><div class="cream cream-3"></div>
      <div class="cream cream-4"></div><div class="cream cream-5"></div><div class="cream cream-6"></div>
      <div class="cream cream-7"></div><div class="cream cream-8"></div><div class="cream cream-9"></div>
      <div class="candle-stick"><div class="flame"></div></div>
      <div class="sparkle sparkle1"></div><div class="sparkle sparkle2"></div>
      <div class="sparkle sparkle3"></div><div class="sparkle sparkle4"></div>

      <div class="confetti confetti-1"></div><div class="confetti confetti-2"></div>
      <div class="confetti confetti-3"></div><div class="confetti confetti-4"></div>
      <div class="confetti confetti-5"></div><div class="confetti confetti-6"></div>
      <div class="confetti confetti-7"></div><div class="confetti confetti-8"></div>
    </div>
  </div>

  <!-- 生日快乐大字 -->
  <div class="birthday-cheer" id="birthdayCheer">
    <div class="cheer-text">🎉 刘禹安，生日快乐！ 🎉</div>
  </div>

  <!-- 落款 -->
  <div class="signature">杜彦德</div>

  <script>
    (() => {
      // ========== DOM引用 ==========
      const D = {
        home: document.getElementById('homePage'),
        openBtn: document.getElementById('openBtn'),
        envLayer: document.getElementById('envelopeLayer'),
        envelope: document.getElementById('envelope'),
        flap: document.getElementById('envelopeFlap'),
        seal: document.getElementById('envelopeSeal'),
        letter: document.getElementById('letterLayer'),
        starScene: document.getElementById('starScene'),
        msgLayer: document.getElementById('messageLayer'),
        claimBtn: document.getElementById('claimBtn'),
        morph: document.getElementById('cakeMorphLayer'),
        cake: document.getElementById('cakeLayer'),
        cheer: document.getElementById('birthdayCheer'),
        starBig: document.getElementById('starLayerBig'),
        starSmall: document.getElementById('starLayerSmall'),
        meteors: document.querySelectorAll('.meteor'),
      };

      // ========== 星空初始化 ==========
      function initStars() {
        for (let i = 0; i < 28; i++) {
          const s = document.createElement('div');
          s.className = 'star-big';
          s.style.left = Math.random() * 100 + '%';
          s.style.top = Math.random() * 100 + '%';
          s.style.animationDelay = Math.random() * 4 + 's';
          D.starBig.appendChild(s);
        }
        for (let i = 0; i < 50; i++) {
          const s = document.createElement('div');
          s.className = 'star-small';
          s.style.left = Math.random() * 100 + '%';
          s.style.top = Math.random() * 100 + '%';
          s.style.animationDelay = Math.random() * 3 + 's';
          D.starSmall.appendChild(s);
        }
      }

      let meteorTimer;

      function startMeteors() {
        if (meteorTimer) clearInterval(meteorTimer);
        meteorTimer = setInterval(() => {
          if (!D.starScene.classList.contains('show')) return;
          const m = D.meteors[Math.floor(Math.random() * D.meteors.length)];
          m.style.top = Math.random() * 35 + '%';
          m.style.left = Math.random() * 55 + 55 + '%';
          m.style.animation = 'none';
          void m.offsetHeight;
          m.style.animation = 'meteorFall 2.5s linear forwards';
        }, 3200);
      }

      function stopMeteors() {
        if (meteorTimer) { clearInterval(meteorTimer);
          meteorTimer = null; }
      }

      // ========== 音频 ==========
      let audioCtx, audioReady = false;

      function initAudio() {
        if (audioReady) return;
        try {
          audioCtx = new(window.AudioContext || window.webkitAudioContext)();
          audioCtx.resume();
          audioReady = true;
        } catch (e) { /* 静默 */ }
      }

      function playSong() {
        if (!audioCtx) return;
        try {
          const now = audioCtx.currentTime;
          const notes = [262, 294, 330, 262, 262, 294, 330, 262, 349, 392, 349, 330, 262, 294, 262, 196, 262, 294,
            330, 262, 262, 294, 330, 262, 349, 392, 349, 330, 262, 294, 262, 196
          ];
          const durs = [0.4, 0.4, 0.8, 0.4, 0.4, 0.8, 0.4, 0.4, 0.4, 0.4, 0.8, 0.4, 0.4, 0.4, 0.4, 0.8, 0.4, 0.4,
            0.8, 0.4, 0.4, 0.8, 0.4, 0.4, 0.4, 0.4, 0.8, 0.4, 0.4, 0.4, 0.4, 0.8
          ];
          let t = now;
          for (let i = 0; i < notes.length; i++) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'triangle';
            o.frequency.value = notes[i];
            g.gain.setValueAtTime(0.15, t);
            g.gain.exponentialRampToValueAtTime(0.0001, t + durs[i]);
            o.start(t);
            o.stop(t + durs[i] + 0.04);
            t += durs[i];
          }
        } catch (e) { /* 静默 */ }
      }

      // ========== Canvas粒子系统 ==========
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      let CW, CH;
      let particles = [],
        phase = 'idle',
        phaseStart = 0,
        animId = null,
        onDone = null;
      const FLY = 2200,
        HOLD = 1500,
        DISSOLVE = 800;

      function resizeCanvas() {
        CW = window.innerWidth;
        CH = window.innerHeight;
        canvas.width = CW * DPR;
        canvas.height = CH * DPR;
        canvas.style.width = CW + 'px';
        canvas.style.height = CH + 'px';
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(DPR, DPR);
      }

      // 按层级分类的代码片段
      const tierSnippets = {
        tier1: ['#include <birthday>', 'void celebrate()', 'printf("HappyBDay")', 'cout<<"刘禹安";'],
        tier2: ['int main()', 'class Cake', 'return 0;', 'auto love=1;', 'while(joy)'],
        tier3: ['for(;;)', '🍰', '🎂'],
        candle: ['🎉✨', '🎈'],
        flame: ['{', '🎊']
      };

      function cakeTargetForTier(tier, cx, cy, sf) {
        let w, h, bottomY;
        switch (tier) {
          case 'tier1':
            w = 250 * sf;
            h = 92 * sf;
            bottomY = 46 * sf;
            break;
          case 'tier2':
            w = 210 * sf;
            h = 80 * sf;
            bottomY = -36 * sf;
            break;
          case 'tier3':
            w = 165 * sf;
            h = 70 * sf;
            bottomY = -106 * sf;
            break;
          case 'candle':
            w = 14 * sf;
            h = 52 * sf;
            bottomY = -166 * sf;
            break;
          case 'flame':
            w = 16 * sf;
            h = 22 * sf;
            bottomY = -214 * sf;
            break;
          default:
            w = 250 * sf;
            h = 92 * sf;
            bottomY = 46 * sf;
        }
        const cY = bottomY - h / 2;
        const halfW = w / 2,
          halfH = h / 2;
        let tx, ty;
        if (Math.random() < 0.7 || tier === 'candle' || tier === 'flame') {
          const perimeter = 2 * (w + h);
          const edge = Math.random() * perimeter;
          if (edge < w) { tx = -halfW + edge;
            ty = cY - halfH; } else if (edge < w + h) { tx = halfW;
            ty = cY - halfH + (edge - w); } else if (edge < 2 * w + h) { tx = halfW - (edge - w - h);
            ty = cY + halfH; } else { tx = -halfW;
            ty = cY + halfH - (edge - 2 * w - h); }
          tx += (Math.random() - 0.5) * 4 * sf;
          ty += (Math.random() - 0.5) * 4 * sf;
        } else {
          tx = (Math.random() - 0.5) * w * 0.75;
          ty = cY + (Math.random() - 0.5) * h * 0.7;
        }
        if (tier === 'candle') { tx = (Math.random() - 0.5) * w * 1.4;
          ty = cY + (Math.random() - 0.5) * h; }
        if (tier === 'flame') { tx = (Math.random() - 0.5) * w * 2.5;
          ty = cY + (Math.random() - 0.4) * h; }
        return { x: cx + tx, y: cy + ty };
      }

      function edgeStart(cx, cy) {
        const side = Math.floor(Math.random() * 4),
          m = 50;
        let x, y;
        switch (side) {
          case 0:
            x = -m - Math.random() * 300;
            y = (Math.random() - 0.5) * 2 * (cy + m);
            break;
          case 1:
            x = CW + m + Math.random() * 300;
            y = (Math.random() - 0.5) * 2 * (cy + m);
            break;
          case 2:
            x = (Math.random() - 0.5) * 2 * (cx + m);
            y = -m - Math.random() * 300;
            break;
          default:
            x = (Math.random() - 0.5) * 2 * (cx + m);
            y = CH + m + Math.random() * 300;
            break;
        }
        return { x, y };
      }

      function spawnParticles() {
        particles = [];
        const cx = CW / 2,
          cy = CH / 2;
        const w = window.innerWidth;
        let cnt, sf;
        if (w <= 480) { cnt = 48;
          sf = 0.52; } else if (w <= 768) { cnt = 65;
          sf = 0.72; } else { cnt = 85;
          sf = 0.92; }

        const tierProbs = [
          { tier: 'tier1', prob: 0.38 },
          { tier: 'tier2', prob: 0.28 },
          { tier: 'tier3', prob: 0.22 },
          { tier: 'candle', prob: 0.08 },
          { tier: 'flame', prob: 0.04 }
        ];

        for (let i = 0; i < cnt; i++) {
          let r = Math.random(),
            tier = 'tier1',
            cum = 0;
          for (const tp of tierProbs) { cum += tp.prob; if (r <= cum) { tier = tp.tier; break; } }
          const snippets = tierSnippets[tier] || tierSnippets.tier1;
          const txt = snippets[Math.floor(Math.random() * snippets.length)];
          const s = edgeStart(cx, cy);
          const t = cakeTargetForTier(tier, cx, cy, sf);
          const delay = Math.random() * 0.7;
          const dur = 1.8 + Math.random() * 1.4;
          const fs = 9 + Math.random() * 12;
          particles.push({
            text: txt,
            fontSize: fs,
            sx: s.x,
            sy: s.y,
            tx: t.x,
            ty: t.y,
            delay,
            dur,
            cx: s.x,
            cy: s.y,
            sc: 1.2,
            alpha: 0,
            glow: 0
          });
        }
      }

      function cubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

      function easeOut(t) { return 1 - (1 - t) * (1 - t); }

      function draw(ts) {
        if (phase === 'idle') { animId = requestAnimationFrame(draw); return; }
        ctx.clearRect(0, 0, CW, CH);
        const elapsed = ts - phaseStart;
        let allDone = true;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for (const p of particles) {
          if (phase === 'flying') {
            const le = elapsed - p.delay * 1000;
            if (le <= 0) { p.cx = p.sx;
              p.cy = p.sy;
              p.sc = 1.2;
              p.alpha = 0;
              allDone = false; continue; }
            const prog = Math.min(1, le / (p.dur * 1000));
            const e = cubic(prog);
            p.cx = p.sx + (p.tx - p.sx) * e;
            p.cy = p.sy + (p.ty - p.sy) * e;
            p.sc = 1.2 - prog * 0.2;
            p.alpha = prog < 0.1 ? (prog / 0.1) * 0.85 : 0.85;
            p.glow = 0.5 + prog * 0.5;
            if (prog < 1) allDone = false;
          } else if (phase === 'holding') {
            p.cx = p.tx;
            p.cy = p.ty;
            p.sc = 1.0;
            p.alpha = 0.85;
            p.glow = 0.9;
            if (elapsed < HOLD) allDone = false;
          } else if (phase === 'dissolving') {
            const prog = Math.min(1, elapsed / DISSOLVE);
            const e = easeOut(prog);
            p.cx = p.tx;
            p.cy = p.ty;
            p.sc = 1.0 + e * 0.7;
            p.alpha = 0.85 * (1 - e);
            p.glow = 0.9 + e * 1.5;
            if (prog < 1) allDone = false;
          }
          if (p.alpha > 0.003) {
            const ga = Math.min(1, p.glow) * p.alpha;
            ctx.shadowColor = `rgba(30,255,142,${ga})`;
            ctx.shadowBlur = 5 + p.glow * 7;
            const a = Math.max(0, Math.min(1, p.alpha));
            const R = Math.min(255, 160 + p.glow * 60);
            const G = 255;
            const B = Math.min(255, 176 + p.glow * 30);
            ctx.fillStyle = `rgba(${R},${G},${B},${a})`;
            ctx.font = `500 ${p.fontSize * p.sc}px "Fira Code","Consolas",monospace`;
            ctx.fillText(p.text, p.cx, p.cy);
          }
        }
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;

        if (allDone) {
          if (phase === 'flying') { phase = 'holding';
            phaseStart = ts; } else if (phase === 'holding') { phase = 'dissolving';
            phaseStart = ts; } else if (phase === 'dissolving') {
            ctx.clearRect(0, 0, CW, CH);
            canvas.classList.remove('active');
            phase = 'idle';
            particles = [];
            cancelAnimationFrame(animId);
            animId = null;
            if (onDone) { const cb = onDone;
              onDone = null;
              requestAnimationFrame(() => requestAnimationFrame(cb)); }
            return;
          }
        }
        animId = requestAnimationFrame(draw);
      }

      function launchParticles(cb) {
        resizeCanvas();
        spawnParticles();
        phase = 'flying';
        phaseStart = performance.now();
        canvas.classList.add('active');
        if (animId) cancelAnimationFrame(animId);
        animId = requestAnimationFrame(draw);
        onDone = cb;
      }

      // ========== 流程控制 ==========
      let busy = false,
        step = 0;

      // 步骤1：首页 → 信封
      D.openBtn.addEventListener('click', () => {
        if (busy) return;
        busy = true;
        initAudio();
        D.home.classList.add('hidden');
        setTimeout(() => {
          D.envLayer.classList.add('show');
          busy = false;
          step = 1;
        }, 420);
      });

      // 步骤2：信封翻盖 + 锁扣弹跳 → 信纸 → 星空
      D.envelope.addEventListener('click', () => {
        if (busy || step !== 1) return;
        busy = true;
        // 锁扣弹跳动画
        D.seal.classList.add('bouncing');
        setTimeout(() => D.seal.classList.remove('bouncing'), 400);
        // 信封震动
        D.envLayer.classList.add('shake');
        setTimeout(() => D.envLayer.classList.remove('shake'), 350);
        // 翻盖打开（稍微延迟，让锁扣弹跳先发生）
        setTimeout(() => {
          D.flap.classList.add('open');
        }, 250);
        // 信纸升起
        setTimeout(() => D.letter.classList.add('show'), 700);
        step = 2;

        const onLetterEnd = () => {
          D.envLayer.style.transition = 'opacity 0.75s ease, transform 0.55s ease';
          D.envLayer.style.opacity = '0';
          D.envLayer.style.transform = 'translate(-50%, -50%) scale(0.78)';
          D.starScene.classList.add('show');
          D.msgLayer.classList.add('show');
          startMeteors();
          step = 3;
          busy = false;
          D.letter.removeEventListener('animationend', onLetterEnd);
        };
        D.letter.addEventListener('animationend', onLetterEnd, { once: true });
        // 后备保险
        setTimeout(() => {
          if (step === 2) {
            D.envLayer.style.opacity = '0';
            D.starScene.classList.add('show');
            D.msgLayer.classList.add('show');
            startMeteors();
            step = 3;
            busy = false;
          }
        }, 3800);
      });

      // 步骤3：领取蛋糕 → 粒子汇聚 → 过渡 → 真实蛋糕
      D.claimBtn.addEventListener('click', () => {
        if (busy || step !== 3) return;
        busy = true;
        D.claimBtn.classList.add('disabled');
        initAudio();
        D.msgLayer.style.opacity = '0';
        D.msgLayer.style.transition = 'opacity 0.55s ease';
        setTimeout(() => {
          D.msgLayer.classList.remove('show');
          D.msgLayer.style.opacity = '';
          D.msgLayer.style.transition = '';
          step = 4;
          launchParticles(() => {
            D.morph.classList.add('show');
            stopMeteors();
            setTimeout(() => {
              D.morph.classList.remove('show');
              requestAnimationFrame(() => {
                D.cake.classList.add('show');
                D.cheer.classList.add('show');
                playSong();
                setTimeout(() => D.cheer.classList.remove('show'), 5000);
                step = 5;
                busy = false;
              });
            }, 1050);
          });
        }, 320);
      });

      // ========== 全局初始化 ==========
      function init() {
        initStars();
        resizeCanvas();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
      }

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resizeCanvas, 200);
      });
      window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 350));
      window.addEventListener('beforeunload', () => {
        if (animId) cancelAnimationFrame(animId);
        if (meteorTimer) clearInterval(meteorTimer);
      });
      init();
    })();
  </script>
</body>
</html>
