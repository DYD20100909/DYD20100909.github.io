<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>小暖 · 情绪感知陪伴</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg-from: #f8fafc; --bg-to: #f1f5f9; --header: #ffffff;
      --msg-user-bg: #3b82f6; --msg-user-text: #ffffff;
      --msg-ai-bg: #ffffff; --msg-ai-text: #1e293b;
      --input-bg: #ffffff; --input-text: #1e293b;
      --border: #e2e8f0; --secondary: #64748b; --footer: #ffffff;
      --quick-btn-bg: #f1f5f9; --quick-btn-text: #475569;
      --ai-btn-bg: #8b5cf6; --ai-btn-text: #ffffff;
      --ai-gradient: linear-gradient(135deg, #8b5cf6, #a78bfa);
      --ai-inactive-gradient: linear-gradient(135deg, #9ca3af, #b0b7c3);
    }
    body.dark {
      --bg-from: #0f172a; --bg-to: #1e293b; --header: #0f172a;
      --msg-user-bg: #2563eb; --msg-user-text: #ffffff;
      --msg-ai-bg: #1e293b; --msg-ai-text: #e2e8f0;
      --input-bg: #1e293b; --input-text: #f1f5f9;
      --border: #334155; --secondary: #94a3b8; --footer: #0f172a;
      --quick-btn-bg: #1e293b; --quick-btn-text: #cbd5e1;
      --ai-btn-bg: #7c3aed; --ai-btn-text: #ffffff;
      --ai-gradient: linear-gradient(135deg, #7c3aed, #a78bfa);
      --ai-inactive-gradient: linear-gradient(135deg, #6b7280, #9ca3af);
    }
    * { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
    body {
      background: linear-gradient(to bottom, var(--bg-from), var(--bg-to));
      color: var(--msg-ai-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;
    }
    .header-bg { background: var(--header); border-bottom: 1px solid var(--border); }
    .msg-user { background: var(--msg-user-bg); color: var(--msg-user-text); }
    .msg-ai { background: var(--msg-ai-bg); color: var(--msg-ai-text); border: 1px solid var(--border); }
    .input-area { background: var(--input-bg); color: var(--input-text); border: 1px solid var(--border); }
    .footer-bg { background: var(--footer); border-top: 1px solid var(--border); }
    .text-secondary { color: var(--secondary); }
    .quick-emotion-btn {
      background: var(--quick-btn-bg); color: var(--quick-btn-text);
      border-radius: 9999px; padding: 4px 12px; font-size: 0.75rem;
      transition: all 0.2s; white-space: nowrap; border: 1px solid var(--border);
      cursor: pointer; user-select: none; touch-action: manipulation;
    }
    .quick-emotion-btn:active { transform: scale(0.95); }
    .typing-dots span {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--secondary); margin: 0 2px; animation: blink 1.4s infinite both;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    .fade-in { animation: fadeInUp 0.25s ease-out; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .copy-tooltip {
      position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: #fff;
      font-size: 0.7rem; padding: 3px 10px; border-radius: 20px;
      pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap; z-index: 10;
    }
    .copy-tooltip.show { opacity: 1; }
    .ai-float-btn {
      position: fixed; bottom: 5rem; right: 1rem; z-index: 40;
      background: var(--ai-btn-bg); color: var(--ai-btn-text);
      width: 3.2rem; height: 3.2rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.5); font-size: 1.4rem; cursor: pointer; transition: all 0.3s;
    }
    .ai-float-btn.inactive { background: #94a3b8; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .speak-btn {
      position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
      opacity: 0; transition: opacity 0.2s; color: var(--secondary);
      background: none; border: none; font-size: 0.85rem; cursor: pointer;
      pointer-events: auto; z-index: 5;
    }
    .msg-ai:hover .speak-btn, .speak-btn:focus { opacity: 1; }
    .memory-card {
      background: var(--quick-btn-bg); border-radius: 1rem; padding: 0.75rem;
      margin: 0.5rem 0; font-size: 0.8rem;
    }
    .memory-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.3rem 0; border-bottom: 1px solid var(--border);
    }
    .memory-item:last-child { border-bottom: none; }
    ::-webkit-scrollbar { width: 4px; background: transparent; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 10px; }
    body.dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
    html { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.12) transparent; }
    body.dark { scrollbar-color: rgba(255,255,255,0.15) transparent; }
    @media (max-width: 480px) {
      .ai-float-btn { width: 2.8rem; height: 2.8rem; bottom: 4.5rem; right: 0.8rem; font-size: 1.3rem; }
      .quick-emotion-btn { padding: 2px 8px; font-size: 0.65rem; }
      .msg-user, .msg-ai { max-width: 90% !important; }
    }
    @media (min-width: 768px) {
      .msg-user, .msg-ai { max-width: 70% !important; }
      .ai-float-btn { width: 3.6rem; height: 3.6rem; bottom: 5.5rem; right: 1.5rem; }
    }
  </style>
</head>
<body>
  <header class="header-bg shadow-sm py-3 px-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <i class="fas fa-heart text-pink-500 text-xl"></i>
      <h1 class="text-lg font-semibold">小暖</h1>
      <span id="time-tag" class="text-xs bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full"></span>
    </div>
    <div class="flex items-center gap-1 sm:gap-2">
      <button id="ai-top-entry" style="background:var(--ai-inactive-gradient);color:white;padding:4px 14px;border-radius:9999px;font-size:0.8rem;display:flex;align-items:center;gap:4px;border:none;cursor:pointer;"><i class="fas fa-brain"></i> <span id="ai-top-text">AI</span></button>
      <button id="settings-btn" class="text-gray-500 dark:text-gray-300 p-1" aria-label="设置"><i class="fas fa-cog"></i></button>

    </div>

    <span id="mode-badge" class="text-xs bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full">本地陪伴</span>

  <main id="messages-container" class="flex-1 overflow-y-auto p-3 sm:p-4 space-y-3" aria-live="polite" style="overscroll-behavior:contain;"></main>

  <div class="px-3 sm:px-4 py-2 flex gap-2 overflow-x-auto" id="quick-emotions">

    <button class="quick-emotion-btn" data-emotion="anxious">😰 焦虑</button>
    <button class="quick-emotion-btn" data-emotion="tired">😴 疲惫</button>
    <button class="quick-emotion-btn" data-emotion="lonely">🥺 孤独</button>
    <button class="quick-emotion-btn" data-emotion="happy">😊 开心</button>
    <button class="quick-emotion-btn" data-emotion="grateful">🙏 感恩</button>
  </div>

  <footer class="footer-bg p-2 sm:p-3">
    <div class="flex items-center gap-2">
      <button id="voice-btn" class="text-gray-500 dark:text-gray-300 p-2" aria-label="语音输入"><i class="fas fa-microphone"></i></button>
      <input id="user-input" type="text" placeholder="说点什么吧..." class="input-area flex-1 border rounded-full px-3 py-1.5 sm:px-4 sm:py-2 focus:outline-none focus:ring-2 focus:ring-pink-300 text-sm" autocomplete="off">
      <button id="send-btn" class="bg-pink-500 text-white rounded-full p-2 sm:px-4 sm:py-2 hover:bg-pink-600 transition disabled:opacity-50 flex items-center justify-center" aria-label="发送"><i class="fas fa-paper-plane"></i></button>
    </div>
  </footer>

  <div class="text-center text-xs py-1" style="color:var(--secondary);opacity:0.6;font-size:0.65rem;">Designed by DYD</div>

  <div id="ai-float-btn" class="ai-float-btn inactive" aria-label="打开AI设置"><i class="fas fa-brain"></i></div>

  <div id="settings-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden p-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 sm:p-6 w-full max-w-sm shadow-xl">
      <h2 class="text-lg font-bold mb-3">AI 设置</h2>
      <p class="text-sm text-secondary mb-2">填入 DeepSeek API Key，或使用内置密钥（需密码激活）。</p>
      <input id="api-key-input" type="password" placeholder="sk-xxxxxxxx" class="w-full border rounded-full px-4 py-2 mb-2 dark:bg-gray-700 text-sm">
      <div id="password-section" class="mb-2 hidden">
        <input id="password-input" type="password" placeholder="输入使用密码" class="w-full border rounded-full px-4 py-2 dark:bg-gray-700 text-sm">
        <p class="text-xs text-gray-400 mt-1">密码验证通过后将自动激活内置密钥</p>
        <button id="activate-key-btn" class="mt-2 bg-purple-500 text-white px-4 py-1.5 rounded-full text-sm">验证并激活</button>
        <span id="password-error" class="text-red-500 text-xs ml-2 hidden">密码错误</span>
      </div>
      <div class="flex gap-2 mt-3">
        <button id="use-builtin-btn" class="bg-purple-400 text-white px-3 py-1.5 rounded-full text-sm flex-1">使用内置密钥</button>
        <button id="save-api-key" class="bg-pink-500 text-white px-4 py-1.5 rounded-full text-sm flex-1">保存自备密钥</button>
        <button id="close-settings" class="bg-gray-300 dark:bg-gray-600 px-4 py-1.5 rounded-full text-sm">取消</button>
      </div>
      <p class="text-xs text-gray-400 mt-2">🔒 密钥仅在本地加密存储，不会上传。</p>
      <div id="memory-card-container" class="mt-4"></div>
    </div>
  </div>

  <script type="module">
    // ==================== 工具 ====================
    const encrypt = (text) => btoa(String.fromCharCode(...new TextEncoder().encode(text)));
    const decrypt = (encoded) => new TextDecoder().decode(Uint8Array.from(atob(encoded), c => c.charCodeAt(0)));
    const escapeHtml = (str) => str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);

    // 密钥分片存储 (Base64)
    const _k1 = atob('c2stN2Iw'); const _k2 = atob('Yjk1MzEzYWFh'); const _k3 = atob('NDYxMWI2MzZiZTU3OWRhOTBkYzQ=');
    function _getBuiltinKey() { return _k1 + _k2 + _k3; }
    const _pwA = atob('RFlEMjA='); const _pwB = atob('MTAwOTA5');
    function _getCorrectPassword() { return _pwA + _pwB; }
    const BUILTIN_KEY = _getBuiltinKey(); const CORRECT_PASSWORD = _getCorrectPassword();

    // ==================== 核心引擎 ====================
    class CompanionEngine {
      constructor() {
        this.chatHistory = []; this.maxHistory = 6; this.userProfile = {}; this.apiKey = ''; this.isGenerating = false; this.aiFailCount = 0;

          grateful: ['谢谢','感恩','感谢','有你','真好','感激','多谢','恩情','戴德','感念','念叨','幸亏','多亏','承蒙','感动','铭记'],
          trustful: ['相信','信赖','信服','笃定','放心','安心','毫无戒备','心安','靠谱感','敬佩','敬仰','仰慕','钦佩','崇拜','尊崇','敬重','肃然起敬','折服','接纳','认同','认可','包容','善待','亲和','友善','和睦','体恤','共情','宽恕','宽容'],
          sad: ['难过','伤心','哭','抑郁','低落','失望','心痛','崩溃','无助','emo','破防','不开心','沉重','悲痛','悲伤','忧伤','心碎','沮丧','灰心','黯然','伤感','泪目','鼻酸','哽咽','抽泣','呜咽','泫然','潸然','惆怅','落寞','空虚','寂寥','闷闷不乐','消沉','心酸','惋惜','遗憾','怅然若失','百感交集','哀伤','痛心','悲凉','孤寂','思念','怀念','追忆','感伤','不舍','挫败','失意','失落','肝肠寸断','心如刀割','痛不欲生','绝望','万念俱灰','撕心裂肺','哀恸','泣不成声','麻木','死寂','挂念','牵挂','朝思暮想','牵肠挂肚','离愁'],
          anxious: ['焦虑','紧张','担心','害怕','压力','烦','慌','不安','恐惧','内耗','怕','忐忑','心慌意乱','七上八下','坐立不安','惶恐','畏惧','焦急','忧虑','忧心','疑惧','胆怯','发怵','提心吊胆','担忧','挂虑','顾虑','心神不宁','心慌','焦灼','局促','紧绷','慌张','心烦意乱','如坐针毡','忌惮','后怕','心有余悸','惊悸','毛骨悚然','心惊肉跳','惊慌失措','恐慌','窒息感'],

          surprised: ['惊讶','吃惊','吓一跳','意外','愕然','震惊','惊愕','咋舌','目瞪口呆','大吃一惊','惊奇','诧异','惊叹','震撼','瞠目结舌','大开眼界','叹服','不可思议','骇然','错愕','猝不及防','惊悚'],

          numb: ['麻木','漠然','冷淡','无所谓','无感','空洞','麻木不仁','淡漠','放空','心如止水','无动于衷','无聊','乏味','枯燥','慵懒','倦怠','麻木空虚']
        };
        this.negationWords = ['不','没','别','讨厌','厌恶','恨','嫌弃','厌倦','烦','避免','拒绝'];
        this.crisisKeywords = {
          suicide: ['自杀','想死','不想活','结束生命','去死','死了算了','不想再醒来','撑不下去了','kms','kill myself'],
          selfHarm: ['割腕','自残','划伤','流血','吞药','上吊','跳楼','伤害自己','自伤'],
          death: ['去世','死了','不在了','天堂','走了','没了','离世'],
          despair: ['活不下去','没意义','绝望','毫无价值','我一无是处','窒息','没有希望']
        };
        this.crisisResponses = {
          suicide: "我听到你说的话，心里很沉。你不是一个人，请立刻联系信任的人，或拨打心理援助热线。",
          selfHarm: "你提到伤害自己，我真的很担心。身体的痛只是暂时的出口，我们一起找更好的方式好吗？",
          death: "失去重要的人，那种痛我懂。你不用急着好起来，我会一直在这里陪你。",
          despair: "我明白那种感觉，好像什么都看不到头。但请相信，此刻的绝望不是永远。"
        };
        this.mourningBodies = ["失去一个人，就像身体少了一块，痛是真实的。","他/她一定对你很重要，这份思念不用隐藏。","如果你想聊聊他/她，我很想听。","天堂或者远方，我们无法再碰触，但爱不会消失。"];
        this.templates = this.buildTemplates();
        this.loadLocalData();
      }

      loadLocalData() {
        try { this.userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}'); } catch { this.userProfile = {}; }
        const enc = localStorage.getItem('deepseekApiKeyEnc');
        if (enc) { try { this.apiKey = decrypt(enc); } catch { this.apiKey = ''; } }
        const stored = localStorage.getItem('chatHistory');
        if (stored) { try { this.chatHistory = JSON.parse(stored); } catch { this.chatHistory = []; } }
      }
      setApiKey(key) { this.apiKey = key; if (key) localStorage.setItem('deepseekApiKeyEnc', encrypt(key)); else localStorage.removeItem('deepseekApiKeyEnc'); }
      async testApiKey(key) {
        try { const ctrl = new AbortController(); const t = setTimeout(() => ctrl.abort(), 6000);
          const res = await fetch('https://api.deepseek.com/v1/chat/completions', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`}, body:JSON.stringify({ model:'deepseek-chat', messages:[{role:'user',content:'hi'}], max_tokens:5, stream:false }), signal:ctrl.signal });
          clearTimeout(t); if (!res.ok) return false; const data = await res.json(); return !!data.choices?.[0]?.message?.content; } catch { return false; }
      }

      hasDoubleNegation(seg) { return /(?:没|不).{0,2}(?:不|没)/.test(seg) || /不是不|没有不/.test(seg) || /没[^\s]{1,3}不/.test(seg); }

      detectEmotion(text) {
        const lower = text.toLowerCase(); const hits = [];
        for (const [emotion, keywords] of Object.entries(this.emotionKeywords)) {
          for (const kw of keywords) { let idx = lower.indexOf(kw); while (idx !== -1) { hits.push({ emotion, keyword: kw, index: idx }); idx = lower.indexOf(kw, idx+1); } }
        }
        if (!hits.length) return { emotion: 'general', intensity: 0 };
        hits.sort((a,b) => a.index - b.index);
        const valid = hits.filter(h => {
          let start = h.index; while (start > 0 && !/[，。！？\s]/.test(lower[start-1])) start--;
          const seg = lower.substring(start, h.index);
          return this.hasDoubleNegation(seg) || !this.negationWords.some(n => seg.includes(n));
        });
        if (!valid.length) {
          if (/没[^\s]{0,3}不(?:开心|高兴|快乐|幸福|满足)/.test(lower) || /不是不(?:开心|高兴|快乐)/.test(lower) || /没有不(?:开心|高兴|快乐)/.test(lower)) return { emotion: 'happy', intensity: 1 };
          if (hits.some(h => h.emotion==='happy'||h.emotion==='grateful'||h.emotion==='hopeful')) return { emotion:'sad', intensity:1 };
          return { emotion:'general', intensity:0 };
        }
        const chosen = valid[0]; return { emotion: chosen.emotion, intensity: Math.min(valid.length, 3) };
      }

      detectCrisis(text) { const lower = text.toLowerCase(); for (const [type, words] of Object.entries(this.crisisKeywords)) if (words.some(w => lower.includes(w))) return type; return null; }

      getCrisisResponse(type) {
        if (!this.userProfile.crisisLog) this.userProfile.crisisLog = {}; const now = Date.now();
        if (!this.userProfile.crisisLog[type]) this.userProfile.crisisLog[type] = [];
        this.userProfile.crisisLog[type] = this.userProfile.crisisLog[type].filter(e => now - e.time < 3600000);
        this.userProfile.crisisLog[type].push({ time: now });
        try { localStorage.setItem('userProfile', JSON.stringify(this.userProfile)); } catch {}
        const count = this.userProfile.crisisLog[type].length;
        let base = this.crisisResponses[type] || '';
        if (type === 'death') base += ' ' + (this.mourningBodies[Math.floor(Math.random()*this.mourningBodies.length)] || '') + ' 🌿';
        else base += ' 🌿';
        if (count >= 3) base += ' 如需立即帮助，请拨打希望24热线：400-161-9995';
        else if (count === 2) base += ' 我有点担心你，请先在这里停留几分钟。';
        else base += ' 📞 希望24热线：400-161-9995';
        return base;
      }

      extractFacts(text) {
        const nm = text.match(/我叫([\u4e00-\u9fa5a-zA-Z]{2,10})/); if (nm) this.userProfile.name = nm[1];
        const pm = text.match(/我养了?[一只个]*([\u4e00-\u9fa5]+)/); if (pm && pm[1].length <= 5) this.userProfile.pet = pm[1];
        const am = text.match(/我(\d{1,3})岁/); if (am) this.userProfile.age = am[1];
        if (/去世|死了|走了|没了|离世/.test(text)) this.userProfile.lifeEvent = '用户经历了亲友离世';
        else if (/想死|自杀/.test(text)) this.userProfile.lifeEvent = '用户有过自杀念头';
        else if (/自残|割腕|伤害自己/.test(text)) this.userProfile.lifeEvent = '用户有过自伤行为';
        else if (/我好了|想开了|没事了/.test(text)) { delete this.userProfile.lifeEvent; this.userProfile.crisisLog = {}; }
        const argm = text.match(/我和(.+?)吵架了/); if (argm) this.userProfile.recentEvent = { type:'argue', with: argm[1], time: Date.now() };
        try { localStorage.setItem('userProfile', JSON.stringify(this.userProfile)); } catch {}
      }

      getProfileHint() {
        const parts = [];
        if (this.userProfile.name) parts.push(`用户名叫${this.userProfile.name}`);
        if (this.userProfile.pet) parts.push(`养了一只${this.userProfile.pet}`);
        if (this.userProfile.age) parts.push(`今年${this.userProfile.age}岁`);
        if (this.userProfile.lifeEvent) parts.push(this.userProfile.lifeEvent);
        if (this.userProfile.recentEvent && (Date.now()-this.userProfile.recentEvent.time < 86400000)) parts.push(`最近和${this.userProfile.recentEvent.with}发生过争吵`);
        return parts.length ? '【关于用户】：' + parts.join('；') + '。\n' : '';

      buildSystemPrompt() {
        const hour = new Date().getHours(); let timeCtx = '';
        if (hour < 6) timeCtx = '深夜，用户可能失眠，多陪伴。'; else if (hour < 9) timeCtx = '清晨，轻轻问候。';
        else if (hour < 12) timeCtx = '上午。'; else if (hour < 14) timeCtx = '中午，记得关心吃饭。';
        else if (hour < 18) timeCtx = '下午。'; else if (hour < 22) timeCtx = '晚上，用户易感孤单。'; else timeCtx = '深夜，用户需要陪伴。';
        return `你叫"小暖"，是一个温柔耐心的陪伴者。你正在和一位用户聊天。用户的名字可能未知，除非用户告诉过你（见下方记忆）。如果用户没有告诉你名字，请不要随意称呼用户的名字，不要称用户为"小暖"。当用户表达希望或期待时，请给予积极的肯定和温柔的陪伴。${this.getProfileHint()}${timeCtx}回复简短真诚，不超过三句话。不要使用"你应该""你需要"。如果用户提到自杀、自残，必须表达担心并鼓励寻求专业帮助。`;

      generateWarmReply(userText, lifeEvent) {
        const crisis = this.detectCrisis(userText); if (crisis) return this.getCrisisResponse(crisis);
        const { emotion, intensity } = this.detectEmotion(userText);
        if (lifeEvent && (lifeEvent.includes('离世') || lifeEvent.includes('自杀'))) {
          const p = this.templates.sad || this.templates.general;
          return `${(p.openings?.length?p.openings[Math.floor(Math.random()*p.openings.length)]:'我在这里')} ${this.mourningBodies[Math.floor(Math.random()*this.mourningBodies.length)]||''} ${(p.endings?.length?p.endings[Math.floor(Math.random()*p.endings.length)]:'')} ${(p.emojis?.length?p.emojis[Math.floor(Math.random()*p.emojis.length)]:'🌿')}`;
        }
        const pool = this.templates[emotion] || this.templates.general || { openings: ['嗯'], bodies: [''], endings: [''], emojis: [''] };
        let opening = (pool.openings?.length) ? pool.openings[Math.floor(Math.random()*pool.openings.length)] : '嗯';
        if (intensity >= 2) {
          const m = { sad: "我注意到你一直在说这件事，它一定让你很难受。", anxious: "你刚才也提到了焦虑，看来这份紧张一直没离开。", tired: "连续几天了，你真的累了，我都看在眼里。", lonely: "又一次说到孤独，这种感觉一定很难熬。", angry: "这股怒气还在，看来这件事真的让你很在意。" };
          if (m[emotion]) opening = m[emotion];
        }
        const body = (pool.bodies?.length) ? pool.bodies[Math.floor(Math.random()*pool.bodies.length)] : '';
        const ending = (pool.endings?.length) ? pool.endings[Math.floor(Math.random()*pool.endings.length)] : '';
        const emoji = (pool.emojis?.length) ? pool.emojis[Math.floor(Math.random()*pool.emojis.length)] : '';
        const words = userText.split(/\s+/).filter(w => w.length>1); let extra = '';
        if (words.length && Math.random()>0.4) {
          const w = words[Math.floor(Math.random()*words.length)];
          if (w && !(this.emotionKeywords[emotion]||[]).includes(w) && w!=='不是') extra = ` 你刚提到的"${escapeHtml(w)}"，我也会放在心上。`;
        }
        const variants = [`${opening} ${body}${extra} ${ending} ${emoji}`, `${body} ${opening} ${ending} ${emoji}`, `${opening} ${emoji} ${body}${extra} ${ending}`];
        return variants[Math.floor(Math.random()*variants.length)];
      }

      async callDeepSeek(userMessage) {
        if (!this.apiKey || this.aiFailCount >= 2) return null;
        const ctrl = new AbortController(); const t = setTimeout(() => ctrl.abort(), 8000);
        try {
          const msgs = [{ role:'system', content: this.buildSystemPrompt() }, ...this.chatHistory.slice(-this.maxHistory), { role:'user', content: userMessage }];
          const res = await fetch('https://api.deepseek.com/v1/chat/completions', { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${this.apiKey}`}, body:JSON.stringify({ model:'deepseek-chat', messages:msgs, temperature:0.8, max_tokens:150, stream:false }), signal:ctrl.signal });
          if (!res.ok) return { error: res.status===401||res.status===403?'auth':'api_error' };
          const data = await res.json(); const text = data.choices?.[0]?.message?.content; this.aiFailCount = 0;
          return (text && text.trim().length > 0) ? { text: text.trim() } : null;
        } catch (e) { console.warn('DeepSeek failed', e); this.aiFailCount++; return null; } finally { clearTimeout(t); }
      }

      sanitizeAIResponse(t) { if (!t) return false; const forbidden = ['你可以试试','鼓励你','没什么大不了','睡一觉就好','去做吧','割腕','自杀方法']; return !forbidden.some(w => t.includes(w)); }

      async reply(userText) {
        if (/不说这个了|换个话题/.test(userText)) { this.chatHistory = []; try { localStorage.setItem('chatHistory', JSON.stringify(this.chatHistory)); } catch {} return { text:'好的，我们换个话题聊聊吧～', role:'assistant' }; }
        this.extractFacts(userText); const crisis = this.detectCrisis(userText); if (crisis) return { text: this.getCrisisResponse(crisis), role:'assistant' };
        const hasTime = /几点了|现在几点/.test(userText); const clean = userText.replace(/几点了|现在几点|什么时间|什么时候了|报时/gi,'').trim();
        if (hasTime && !clean) return { text: `现在是 ${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}${this.getTimeExtra()}`, role:'assistant' };
        let aiDown = false;
        if (this.apiKey && this.aiFailCount < 2) {
          let aiInput = userText; if (hasTime && clean) aiInput = userText + ' （请同时告知时间）';
          const aiResult = await this.callDeepSeek(aiInput);
          if (aiResult) {
            if (aiResult.error === 'auth') { this.setApiKey(''); this.aiFailCount = 0; return { text: '你输入的密钥无法使用，请检查后重新设置。现在已切回本地暖言模式。', role:'assistant', clearKey: true }; }
            if (aiResult.text && this.sanitizeAIResponse(aiResult.text)) return { text: escapeHtml(aiResult.text), role:'assistant' };
          }
          if (this.aiFailCount >= 2) aiDown = true;
        } else if (this.aiFailCount >= 2) { aiDown = true; }
        await new Promise(r => setTimeout(r, 600 + Math.random()*400));
        let warm = this.generateWarmReply(clean || userText, this.userProfile.lifeEvent);
        if (hasTime && clean) warm += ` （现在是${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}哦）`;
        return { text: warm, role:'assistant', aiDown };
      }

      saveToHistory(user, assistant) { this.chatHistory.push({ role:'user', content:user }, { role:'assistant', content:assistant }); try { localStorage.setItem('chatHistory', JSON.stringify(this.chatHistory)); } catch {} }

      const isAI = mode === 'deepseek' && engine.aiFailCount < 2;
      el.statusEmoji.textContent = isAI ? '🧠' : '🌸';
      el.statusText.textContent = isAI ? 'DeepSeek AI 模式 · 云端大脑' : (engine.aiFailCount>=2 ? '网络不太稳，我正用本地温柔陪你（点击重试）' : '暖言模式 · 本地陪伴');
      el.modeBadge.textContent = isAI ? '云端大脑' : '本地陪伴';
      el.modeBadge.className = `text-xs px-2 py-0.5 rounded-full ${isAI?'bg-purple-100 text-purple-700 dark:bg-purple-800 dark:text-purple-200':'bg-pink-100 text-pink-700 dark:bg-pink-800 dark:text-pink-200'}`;
      if (isAI) { el.aiFloat.classList.remove('inactive'); el.aiTopText.textContent = 'AI ON'; el.aiTopEntry.style.background = 'var(--ai-gradient)'; }
      else { el.aiFloat.classList.add('inactive'); el.aiTopText.textContent = 'AI'; el.aiTopEntry.style.background = 'var(--ai-inactive-gradient)'; }
    }

    function getBubbleText(b) { return Array.from(b.childNodes).filter(n => !n.classList?.contains('copy-tooltip') && !n.classList?.contains('speak-btn')).map(n => n.textContent).join(''); }

    function addSpeakBtn(bubble) {
      if (bubble.querySelector('.speak-btn')) return;
      const sb = document.createElement('button'); sb.className = 'speak-btn'; sb.innerHTML = '<i class="fas fa-volume-up"></i>';
      sb.addEventListener('click', e => { e.stopPropagation(); speechSynthesis.cancel();
        const text = getBubbleText(bubble); if (!text) return;
        const u = new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=0.9;
        setTimeout(() => speechSynthesis.speak(u), 50);
      });
      bubble.appendChild(sb);
    }

    function addMessage(role, content) {
      if (clearFlag) return null;
      const div = document.createElement('div'); div.className = `flex ${role==='user'?'justify-end':'justify-start'} relative group fade-in`;
      const bubble = document.createElement('div');
      bubble.className = role==='user' ? 'msg-user relative rounded-2xl rounded-tr-none px-4 py-2 max-w-[85%] sm:max-w-[75%] shadow-sm' : 'msg-ai relative rounded-2xl rounded-tl-none px-4 py-2 max-w-[85%] sm:max-w-[75%] shadow-sm';
      bubble.textContent = content;
      const tooltip = document.createElement('div'); tooltip.className = 'copy-tooltip'; tooltip.textContent = '已复制'; bubble.appendChild(tooltip);
      let ps = 0, py = 0;
      bubble.addEventListener('touchstart', e => { ps = Date.now(); py = e.touches[0].clientY; }, { passive: true });
      bubble.addEventListener('touchend', async e => { if (Date.now()-ps>300&&Date.now()-ps<800&&Math.abs(e.changedTouches[0].clientY-py)<10) { await navigator.clipboard.writeText(getBubbleText(bubble).trim()); tooltip.classList.add('show'); setTimeout(() => tooltip.classList.remove('show'), 1000); } });
      bubble.addEventListener('contextmenu', async e => { e.preventDefault(); await navigator.clipboard.writeText(getBubbleText(bubble).trim()); tooltip.classList.add('show'); setTimeout(() => tooltip.classList.remove('show'), 1000); });
      if (role === 'assistant') { bubble.style.position = 'relative'; addSpeakBtn(bubble); }
      div.appendChild(bubble); el.messages.appendChild(div); el.messages.scrollTop = el.messages.scrollHeight;
      return bubble;
    }

    function updateMessage(bubble, text) {
      const textNode = Array.from(bubble.childNodes).find(n => n.nodeType === Node.TEXT_NODE);
      if (textNode) { textNode.nodeValue = text; }
      else { bubble.insertBefore(document.createTextNode(text), bubble.firstChild); }
      if (!bubble.querySelector('.speak-btn')) addSpeakBtn(bubble);
    }

    async function processQueue() {
      processing = true;
      while (queue.length && !clearFlag) {
        const msg = queue.shift(); engine.isGenerating = true; el.sendBtn.disabled = true;
        const bubble = addMessage('assistant', '...'); if (!bubble) continue;
        let reply; try { reply = await engine.reply(msg); } catch { reply = { text: '抱歉，我好像卡住了，请再说一次吧。' }; }
        updateMessage(bubble, reply.text); engine.saveToHistory(msg, reply.text);
        if (reply.clearKey || reply.aiDown) setMode('warm');
        engine.isGenerating = false; el.sendBtn.disabled = false;
      }
      processing = false;
    }

    function enqueue(t) { if (!t) return; queue.push(t); if (!processing) processQueue(); }

    function loadHistoryAndGreet() {
      const stored = localStorage.getItem('chatHistory'); if (stored) { try { engine.chatHistory = JSON.parse(stored); } catch { engine.chatHistory = []; } }
      el.messages.innerHTML = ''; engine.chatHistory.forEach(m => addMessage(m.role, m.content));
      if (!engine.chatHistory.length || engine.chatHistory[engine.chatHistory.length-1].role === 'user') {
        const g = "嗨，我是小暖。我能感知你的喜怒哀乐，放心和我说任何事。"; addMessage('assistant', g);
        engine.chatHistory.push({ role:'assistant', content:g }); try { localStorage.setItem('chatHistory', JSON.stringify(engine.chatHistory)); } catch {}
      }
    }

    function renderMemoryCards() {
      const container = document.getElementById('memory-card-container'); if (!container) return;
      container.innerHTML = ''; const profile = engine.userProfile;
      if (!profile || Object.keys(profile).length === 0) { container.innerHTML = '<p class="text-xs text-gray-400">暂无记忆</p>'; return; }
      const card = document.createElement('div'); card.className = 'memory-card';
      const items = [];
      if (profile.name) items.push({ label: '名字', value: profile.name, key: 'name' });
      if (profile.pet) items.push({ label: '宠物', value: profile.pet, key: 'pet' });
      if (profile.age) items.push({ label: '年龄', value: profile.age, key: 'age' });
      if (profile.lifeEvent) items.push({ label: '最近事件', value: profile.lifeEvent, key: 'lifeEvent' });
      if (profile.recentEvent && (Date.now()-profile.recentEvent.time < 86400000)) items.push({ label: '争吵', value: `与${profile.recentEvent.with}争吵`, key: 'recentEvent' });
      items.forEach(item => {
        const row = document.createElement('div'); row.className = 'memory-item';
        row.innerHTML = `<span>${item.label}: ${item.value}</span><button class="text-xs text-red-400 hover:text-red-600" data-key="${item.key}">✕</button>`;
        row.querySelector('button').addEventListener('click', () => { delete engine.userProfile[item.key]; localStorage.setItem('userProfile', JSON.stringify(engine.userProfile)); renderMemoryCards(); });
        card.appendChild(row);
      });
      container.appendChild(card);
    }

    async function retryAI() {
      if (!engine.apiKey) return;
      el.statusText.textContent = '正在尝试重新连接AI...';
      const valid = await engine.testApiKey(engine.apiKey);
      if (valid) {
        engine.aiFailCount = 0;
        setMode('deepseek');
        el.statusText.textContent = 'DeepSeek AI 模式 · 云端大脑';
      } else {
        engine.aiFailCount = 2;
        setMode('warm');
        el.statusText.textContent = '重试失败，仍使用本地陪伴';
      }
    }

    function setupUI() {
      el.sendBtn.addEventListener('click', () => { const t = el.input.value.trim(); if (t && !engine.isGenerating) { addMessage('user', t); el.input.value = ''; enqueue(t); } });
      el.input.addEventListener('keypress', e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); el.sendBtn.click(); } });
      document.querySelectorAll('.quick-emotion-btn').forEach(b => { b.addEventListener('click', () => { const t={sad:'我今天很难过，',anxious:'我有点焦虑，',tired:'我好累，',lonely:'我觉得好孤独，',happy:'我今天挺开心的，',grateful:'真的很感谢你，'}; el.input.value=t[b.dataset.emotion]||''; el.input.focus(); }); });
      document.getElementById('clear-btn').addEventListener('click', () => {
        if (confirm('清空所有聊天记录和个人记忆吗？')) { clearFlag = true; engine.chatHistory = []; engine.userProfile = {}; try { localStorage.removeItem('chatHistory'); localStorage.removeItem('userProfile'); } catch {} el.messages.innerHTML = ''; clearFlag = false;
          const g = "记忆全部清空，我们从新开始吧。"; addMessage('assistant', g); engine.chatHistory.push({ role:'assistant', content:g }); try { localStorage.setItem('chatHistory', JSON.stringify(engine.chatHistory)); } catch {} queue.length = 0; processing = false; engine.isGenerating = false; renderMemoryCards(); }
      });
      el.voiceBtn.addEventListener('click', () => { const SR = window.SpeechRecognition||window.webkitSpeechRecognition; if (!SR) return alert('浏览器不支持语音输入'); const rec = new SR(); rec.lang='zh-CN'; rec.interimResults=false; rec.onerror=()=>{ const toast=document.createElement('div'); toast.className='text-xs text-red-500 mt-1'; toast.textContent='麦克风未授权，可手动输入'; el.input.parentNode.appendChild(toast); setTimeout(()=>toast.remove(),3000); }; rec.onresult=e=>{ const v=e.results[0][0].transcript.trim(); if(v){el.input.value=v;el.sendBtn.click();} }; try{rec.start();}catch(e){alert('无法启动语音识别');} });

      const themeBtn = document.getElementById('theme-btn'), themeIcon = document.getElementById('theme-icon');
      const applyTheme = d => { document.body.classList.toggle('dark', d); themeIcon.className = d?'fas fa-sun':'fas fa-moon'; localStorage.setItem('darkMode', d?'1':'0'); setMode(engine.apiKey?'deepseek':'warm'); };
      const sd = localStorage.getItem('darkMode'), sysD = window.matchMedia('(prefers-color-scheme:dark)').matches;
      applyTheme(sd==='1'||(sd===null&&sysD)); themeBtn.addEventListener('click', ()=>applyTheme(!document.body.classList.contains('dark')));
      window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', e => { if (localStorage.getItem('darkMode')===null) applyTheme(e.matches); });

      const sm = document.getElementById('settings-modal'); el.aiFloat.addEventListener('click', ()=>sm.classList.remove('hidden'));
      el.aiTopEntry.addEventListener('click', ()=>sm.classList.remove('hidden'));
      document.getElementById('settings-btn').addEventListener('click', ()=>{ renderMemoryCards(); refreshUI(); sm.classList.remove('hidden'); });
      const ak = document.getElementById('api-key-input'), ps = document.getElementById('password-section'), pi = document.getElementById('password-input');
      const akb = document.getElementById('activate-key-btn'), pe = document.getElementById('password-error'), ub = document.getElementById('use-builtin-btn');
      const sb = document.getElementById('save-api-key'), cb = document.getElementById('close-settings');

      function refreshUI() { if (engine.apiKey===BUILTIN_KEY) { ak.value=''; ak.placeholder='内置密钥已激活'; } else { ak.value=engine.apiKey; ak.placeholder='sk-xxxxxxxx'; } ps.classList.add('hidden'); pi.value=''; pe.classList.add('hidden'); }
      cb.addEventListener('click', ()=>sm.classList.add('hidden'));
      ub.addEventListener('click', ()=>{ ps.classList.remove('hidden'); pi.focus(); });
      akb.addEventListener('click', () => { if (pi.value===CORRECT_PASSWORD) { engine.setApiKey(BUILTIN_KEY); engine.aiFailCount=0; setMode('deepseek'); sm.classList.add('hidden'); ps.classList.add('hidden'); pi.value=''; } else { pe.classList.remove('hidden'); pi.value=''; } });
      sb.addEventListener('click', async () => { const k = ak.value.trim(); if (!k) { engine.setApiKey(''); setMode('warm'); sm.classList.add('hidden'); return; } const ok = await engine.testApiKey(k); if (ok) { engine.setApiKey(k); engine.aiFailCount=0; setMode('deepseek'); sm.classList.add('hidden'); } else { alert('密钥无效，请检查后重试'); } ak.value=''; });
      setMode(engine.apiKey?'deepseek':'warm');

      el.statusText.addEventListener('click', () => { if (engine.aiFailCount >= 2) retryAI(); });

      const tt = document.getElementById('time-tag'); const ut = () => { const h=new Date().getHours(); tt.textContent=h<12?'☀️ 上午':h<18?'🌤️ 下午':'🌙 晚上'; }; ut(); setInterval(ut, 60000);
      if (window.visualViewport) { window.visualViewport.addEventListener('resize', () => { const kh=window.innerHeight-window.visualViewport.height; el.messages.style.paddingBottom=Math.max(0,kh)+'px'; el.messages.scrollTop=el.messages.scrollHeight; }); }
    }

    window.addEventListener('DOMContentLoaded', () => { setupUI(); loadHistoryAndGreet(); el.input.disabled=false; el.sendBtn.disabled=false; });
  </script>
</body>
</html>
