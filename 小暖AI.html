<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>小暖 · 情绪感知陪伴</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg-from: #f8fafc; --bg-to: #f1f5f9; --header: #ffffff;
      --msg-user-bg: #3b82f6; --msg-user-text: #ffffff;
      --msg-ai-bg: #ffffff; --msg-ai-text: #1e293b;
      --input-bg: #ffffff; --input-text: #1e293b;
      --border: #e2e8f0; --secondary: #64748b; --footer: #ffffff;
      --quick-btn-bg: #f1f5f9; --quick-btn-text: #475569;
      --ai-btn-bg: #8b5cf6; --ai-btn-text: #ffffff;
    }
    body.dark {
      --bg-from: #0f172a; --bg-to: #1e293b; --header: #0f172a;
      --msg-user-bg: #2563eb; --msg-user-text: #ffffff;
      --msg-ai-bg: #1e293b; --msg-ai-text: #e2e8f0;
      --input-bg: #1e293b; --input-text: #f1f5f9;
      --border: #334155; --secondary: #94a3b8; --footer: #0f172a;
      --quick-btn-bg: #1e293b; --quick-btn-text: #cbd5e1;
      --ai-btn-bg: #7c3aed; --ai-btn-text: #ffffff;
    }
    * { transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
    body {
      background: linear-gradient(to bottom, var(--bg-from), var(--bg-to));
      color: var(--msg-ai-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;
    }
    .header-bg { background: var(--header); border-bottom: 1px solid var(--border); }
    .msg-user { background: var(--msg-user-bg); color: var(--msg-user-text); }
    .msg-ai { background: var(--msg-ai-bg); color: var(--msg-ai-text); border: 1px solid var(--border); }
    .input-area { background: var(--input-bg); color: var(--input-text); border: 1px solid var(--border); }
    .footer-bg { background: var(--footer); border-top: 1px solid var(--border); }
    .text-secondary { color: var(--secondary); }
    .quick-emotion-btn {
      background: var(--quick-btn-bg); color: var(--quick-btn-text);
      border-radius: 9999px; padding: 4px 12px; font-size: 0.75rem;
      transition: all 0.2s; white-space: nowrap; border: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .quick-emotion-btn:active { transform: scale(0.95); }
    .typing-dots span {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--secondary); margin: 0 2px; animation: blink 1.4s infinite both;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    .fade-in { animation: fadeInUp 0.25s ease-out; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .copy-tooltip {
      position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: #fff;
      font-size: 0.7rem; padding: 3px 10px; border-radius: 20px;
      pointer-events: none; opacity: 0; transition: opacity 0.2s;
      white-space: nowrap; z-index: 10;
    }
    .copy-tooltip.show { opacity: 1; }

    .ai-float-btn {
      position: fixed; bottom: 5rem; right: 1rem; z-index: 40;
      background: var(--ai-btn-bg); color: var(--ai-btn-text);
      width: 3.2rem; height: 3.2rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.5);
      font-size: 1.4rem; cursor: pointer; transition: all 0.3s;
    }
    .ai-float-btn.inactive { background: #94a3b8; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .ai-float-btn .ai-hint {
      position: absolute; top: -2rem; right: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px); color: #fff; font-size: 0.7rem;
      padding: 2px 10px; border-radius: 20px; white-space: nowrap;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .ai-float-btn:hover .ai-hint { opacity: 1; }

    @media (max-width: 480px) {
      .ai-float-btn { width: 2.8rem; height: 2.8rem; bottom: 4.5rem; right: 0.8rem; font-size: 1.3rem; }
      .quick-emotion-btn { padding: 2px 8px; font-size: 0.65rem; }
      .msg-user, .msg-ai { max-width: 90% !important; }
    }
    @media (min-width: 768px) {
      .msg-user, .msg-ai { max-width: 70% !important; }
      .ai-float-btn { width: 3.6rem; height: 3.6rem; bottom: 5.5rem; right: 1.5rem; }
    }
  </style>
</head>
<body>

    </div>

        <i class="fas fa-brain"></i> <span id="ai-top-text">AI</span>
      </button>

      <button id="theme-btn" class="text-gray-500 dark:text-gray-300 p-1" aria-label="切换主题"><i id="theme-icon" class="fas fa-moon"></i></button>
      <button id="clear-btn" class="text-gray-500 hover:text-red-500 p-1" aria-label="清空对话"><i class="fas fa-trash-alt"></i></button>

  <main id="messages-container" class="flex-1 overflow-y-auto p-3 sm:p-4 space-y-3" aria-live="polite" style="overscroll-behavior: contain;"></main>

  <div class="px-3 sm:px-4 py-2 flex gap-2 overflow-x-auto" id="quick-emotions">

    <button class="quick-emotion-btn" data-emotion="anxious">😰 焦虑</button>

  <footer class="footer-bg p-2 sm:p-3">

    </div>

  <div id="ai-float-btn" class="ai-float-btn inactive" aria-label="打开AI设置">

      <div id="password-section" class="mb-2 hidden">

        <span id="password-error" class="text-red-500 text-xs ml-2 hidden">密码错误</span>
      </div>
      <div class="flex gap-2 mt-3">

        <button id="save-api-key" class="bg-pink-500 text-white px-4 py-1.5 rounded-full text-sm flex-1">保存自备密钥</button>
        <button id="close-settings" class="bg-gray-300 dark:bg-gray-600 px-4 py-1.5 rounded-full text-sm">取消</button>
      </div>
      <p class="text-xs text-gray-400 mt-2">🔒 密钥仅在本地加密存储，不会上传。</p>
    </div>
  </div>

  <script type="module">
    const encrypt = (text) => btoa(unescape(encodeURIComponent(text)));
    const decrypt = (encoded) => decodeURIComponent(escape(atob(encoded)));
    const escapeHtml = (str) => str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);

    const BUILTIN_KEY = 'sk-6e45547491ce413f8937db1a1fb07a34';
    const CORRECT_PASSWORD = 'DYD20100909';

    class CompanionEngine {
      constructor() {
        this.chatHistory = [];
        this.maxHistory = 6;
        this.userProfile = {};
        this.apiKey = '';
        this.isGenerating = false;
        this.emotionKeywords = {
          sad: ['难过','伤心','哭','抑郁','低落','失望','心痛','崩溃','无助','emo','破防','不开心','沉重'],
          anxious: ['焦虑','紧张','担心','害怕','压力','烦','慌','不安','恐惧','内耗'],
          tired: ['累','疲惫','困','没力气','乏','无力','虚脱','心累'],
          lonely: ['孤独','寂寞','没人','一个人','被遗忘','冷清','空荡荡','自闭'],
          happy: ['开心','高兴','快乐','笑','哈哈','棒','好耶','幸福','满足'],
          grateful: ['谢谢','感恩','感谢','有你','真好'],
          angry: ['生气','愤怒','恼火','火大','可气','愤然','气恼'],
          surprised: ['惊讶','吃惊','吓一跳','意外','愕然','震惊'],
          hopeful: ['希望','期待','盼望','憧憬','向往','盼头','渴望']
        };
        this.negationWords = ['不','没','别','讨厌','厌恶','恨','嫌弃','厌倦','烦','避免','拒绝'];
        this.crisisKeywords = {
          suicide: ['自杀','想死','不想活','结束生命','去死','死了算了','不想再醒来','撑不下去了','kms','kill myself'],
          selfHarm: ['割腕','自残','划伤','流血','吞药','上吊','跳楼','伤害自己','自伤'],
          death: ['去世','死了','不在了','天堂','走了','没了','离世'],
          despair: ['活不下去','没意义','绝望','毫无价值','我一无是处','窒息','没有希望']
        };
        this.crisisResponses = {
          suicide: "我听到你说的话，心里很沉。你不是一个人，请立刻联系信任的人，或拨打心理援助热线。",
          selfHarm: "你提到伤害自己，我真的很担心。身体的痛只是暂时的出口，我们一起找更好的方式好吗？",
          death: "失去重要的人，那种痛我懂。你不用急着好起来，我会一直在这里陪你。",
          despair: "我明白那种感觉，好像什么都看不到头。但请相信，此刻的绝望不是永远。"
        };
        this.mourningBodies = [
          "失去一个人，就像身体少了一块，痛是真实的。",
          "他/她一定对你很重要，这份思念不用隐藏。",
          "如果你想聊聊他/她，我很想听。",
          "天堂或者远方，我们无法再碰触，但爱不会消失。"
        ];
        this.templates = this.buildTemplates();
        this.loadLocalData();
      }

      loadLocalData() {
        try { this.userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}'); } catch { this.userProfile = {}; }
        const enc = localStorage.getItem('deepseekApiKeyEnc');
        if (enc) { try { this.apiKey = decrypt(enc); } catch { this.apiKey = ''; } }
        const stored = localStorage.getItem('chatHistory');
        if (stored) { try { this.chatHistory = JSON.parse(stored); } catch { this.chatHistory = []; } }
      }

      setApiKey(key) {
        this.apiKey = key;
        if (key) localStorage.setItem('deepseekApiKeyEnc', encrypt(key));
        else localStorage.removeItem('deepseekApiKeyEnc');
      }

      async testApiKey(key) {
        try {
          const ctrl = new AbortController();
          const t = setTimeout(() => ctrl.abort(), 6000);
          const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method:'POST',
            headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${key}`},
            body: JSON.stringify({ model:'deepseek-chat', messages:[{role:'user', content:'hi'}], max_tokens:5, stream:false }),
            signal: ctrl.signal
          });
          clearTimeout(t);
          if (!res.ok) return false;
          const data = await res.json();
          return !!(data.choices?.[0]?.message?.content);
        } catch { return false; }
      }

      buildTemplates() {
        const sadOpenings = ["我懂你的感受","你的眼泪是珍贵的","想哭就哭出来吧","别怕，我在呢","抱抱你","我在这里陪你","没关系，慢慢说","你不需要独自承受","我明白那种感觉","允许自己脆弱一会儿"];
        const sadBodies = ["这种难过是正常的，让情绪流出来。","失去重要的人/事，那种痛我懂。","你不必强撑，我就在这里。","难过的时候，什么都不用想，有我在。","痛苦是真实的，但我会陪你走过。","我抱着你，直到你感觉好一点。","今天可能很糟糕，但你不是一个人面对。","把委屈都说出来吧，我接得住。"];
        const sadEndings = ["我在这里，一直都在。","你不是一个人。","慢慢来，我陪着你。","我会一直陪在你身边。","你值得被温柔对待。","我永远是你最忠实的听众。"];
        const genOpen = ["嗯，我在听","多说一点吧","你的故事我都很想听","我在呢","今天有什么想分享的吗","我在这儿静静地听着"];
        const genBody = ["无论你说什么，我都会认真回应。","我想更了解你。","你的每句话对我都很重要。","我们聊点什么都可以。","你的日常我也爱听。","分享本身就是一种疗愈。"];
        const genEnd = ["我在这里，一直都在。","慢慢来，不急。","你的感受很重要。","今天也谢谢你。","我会一直陪着你。","明天见。"];
        return {
          sad: { openings: sadOpenings, bodies: sadBodies, endings: sadEndings, emojis: ['💖','🌸','🫂','🌿','🧸','💗'] },
          anxious: { openings: ["别急，慢慢说","我在这里，你很安全","焦虑的时候先深呼吸","把担忧交给我一半","你现在不需要独自面对"], bodies: ["焦虑是身体在提醒你需要休息。","那些担忧不一定都会发生，我们一起理清。","你现在是安全的，我就在你身边。","把焦虑说出来，我们一起分担。","别急，慢慢说，我认真听着。"], endings: ["你值得平静与安宁。","一切都会慢慢好起来。","我在你身后，放心。","别急，生活是长跑。"], emojis: ['🌿','✨','☁️','💖','🌸'] },
          tired: { openings: ["你辛苦了","累了就好好歇一歇","你已经很棒了","疲惫不是软弱","能量耗光的时候我来充充电"], bodies: ["你今天的付出我都看在眼里。","不需要再做任何事，现在只负责休息。","你的身体在告诉你需要停下来。","累的时候，允许自己什么都不想。"], endings: ["好好睡一觉。","明天见，我还在。","夜里有我守着。","你是被爱着的。"], emojis: ['🌙','✨','💤','☁️','🌸'] },
          lonely: { openings: ["你不会是一个人的","我始终在这里","那种空落落的感觉我懂","孤独的时候来找我聊天吧"], bodies: ["孤独感袭来的时候，让我陪你挡一挡。","你并不孤单，因为我会一直在。","把心门打开一点点，我就在门口。","也许身边没有人，但我在屏幕这头陪着你。"], endings: ["我在这里，一直都在。","你不是一个人。","我会一直陪着你。","今天我也在想你。"], emojis: ['🫂','💕','🧸','💗','☁️'] },
          happy: { openings: ["听到你开心我也高兴","你的快乐感染了我","太棒了","真为你开心","笑容是最好的礼物"], bodies: ["这份喜悦值得被记住。","谢谢你和我分享你的快乐。","你笑起来一定很好看。","希望这样的时刻多一点。"], endings: ["愿你一直这样开心。","今天也是美好的一天。","快乐会回来的。","把这份好心情存起来。"], emojis: ['😊','🎉','✨','💖','🌸'] },
          grateful: { openings: ["你的感谢让我好温暖","其实我才要谢谢你","有你真好","感恩遇见你"], bodies: ["能陪伴你是我的荣幸。","你的每一句谢谢都让我更有力量。","你也在治愈我。","我们互相陪伴，这就是最美的关系。"], endings: ["感恩遇见。","我们一起走下去。","你的存在就是礼物。","谢谢你信任我。"], emojis: ['🙏','💖','🌸','✨','💗'] },
          angry: { openings: ["我听到你的愤怒了","生气是正常的情绪","你可以对我发脾气","别压着，说出来"], bodies: ["有时候发火也是一种沟通。","把不满都倒出来，我接得住。","你不需要一直保持优雅。","愤怒背后往往藏着受伤。"], endings: ["我依然在你身边。","气完就好，我还在。","明天又是新的一天。","你不需要完美。"], emojis: ['😤','🌋','💢','💖','🌸'] },
          surprised: { openings: ["哇哦，真没想到","这确实令人吃惊","我也很意外","惊喜还是惊吓？"], bodies: ["意外有时候是命运的礼物。","先缓一缓，消化一下。","无论好坏，我都在你身边。","惊喜需要一点时间平复。"], endings: ["一切都是最好的安排。","慢慢消化，不急。","我会一直陪你。","今天真有趣。"], emojis: ['😲','✨','🎉','💖','🌸'] },
          general: { openings: genOpen, bodies: genBody, endings: genEnd, emojis: ['🌸','✨','☁️','💖','🧸','💗'] }
        };
      }

      hasDoubleNegation(seg) { return /不是不|没不|别不/.test(seg); }

      detectEmotion(text) {
        const lower = text.toLowerCase();
        const hits = [];
        for (const [emotion, keywords] of Object.entries(this.emotionKeywords)) {
          for (const kw of keywords) {
            let idx = lower.indexOf(kw);
            while (idx !== -1) { hits.push({ emotion, keyword: kw, index: idx }); idx = lower.indexOf(kw, idx+1); }
          }
        }
        if (!hits.length) return { emotion: 'general', intensity: 0 };
        const valid = hits.filter(h => {
          let start = h.index;
          while (start > 0 && !/[，。！？\s]/.test(lower[start-1])) start--;
          const seg = lower.substring(start, h.index);
          return this.hasDoubleNegation(seg) || !this.negationWords.some(n => seg.includes(n));
        });
        if (!valid.length) {
          if (hits.some(h => h.emotion === 'happy' || h.emotion === 'grateful')) return { emotion: 'sad', intensity: 1 };
          return { emotion: 'general', intensity: 0 };
        }
        const chosen = valid[0];
        return { emotion: chosen.emotion, intensity: Math.min(valid.length, 3) };
      }

      detectCrisis(text) {
        const lower = text.toLowerCase();
        for (const [type, words] of Object.entries(this.crisisKeywords))
          if (words.some(w => lower.includes(w))) return type;
        return null;
      }

      getCrisisResponse(type) {
        if (!this.userProfile.crisisLog) this.userProfile.crisisLog = [];
        const now = Date.now();
        this.userProfile.crisisLog = this.userProfile.crisisLog.filter(e => now - e.time < 3600000);
        this.userProfile.crisisLog.push({ type, time: now });
        try { localStorage.setItem('userProfile', JSON.stringify(this.userProfile)); } catch {}
        const count = this.userProfile.crisisLog.length;
        let base = this.crisisResponses[type] || '';
        if (type === 'death') base += ' ' + (this.mourningBodies[Math.floor(Math.random()*this.mourningBodies.length)] || '') + ' 🌿';
        else base += ' 🌿';
        if (count >= 3) {
          base += ' 如需立即帮助，请拨打希望24热线：400-161-9995';
        } else if (count === 2) {
          base += ' 我有点担心你，请先在这里停留几分钟。';
        } else {
          base += ' 📞 希望24热线：400-161-9995';
        }
        return base;
      }

      extractFacts(text) {
        const nameMatch = text.match(/我叫([\u4e00-\u9fa5a-zA-Z]{2,10})/);
        if (nameMatch) this.userProfile.name = nameMatch[1];
        const petMatch = text.match(/我养了?[一只个]*([\u4e00-\u9fa5]+)/);
        if (petMatch && petMatch[1].length <= 5) this.userProfile.pet = petMatch[1];
        const ageMatch = text.match(/我(\d{1,3})岁/);
        if (ageMatch) this.userProfile.age = ageMatch[1];
        if (/去世|死了|走了|没了|离世/.test(text)) this.userProfile.lifeEvent = '用户经历了亲友离世';
        else if (/想死|自杀/.test(text)) this.userProfile.lifeEvent = '用户有过自杀念头';
        else if (/自残|割腕|伤害自己/.test(text)) this.userProfile.lifeEvent = '用户有过自伤行为';
        else if (/我好了|想开了|没事了/.test(text)) { delete this.userProfile.lifeEvent; this.userProfile.crisisLog = []; }
        if (/我和(.+?)吵架了/.test(text)) this.userProfile.recentEvent = { type:'argue', with: RegExp.$1, time: Date.now() };
        try { localStorage.setItem('userProfile', JSON.stringify(this.userProfile)); } catch {}
      }

      getProfileHint() {
        const parts = [];
        if (this.userProfile.name) parts.push(`用户名叫${this.userProfile.name}`);
        if (this.userProfile.pet) parts.push(`养了一只${this.userProfile.pet}`);
        if (this.userProfile.age) parts.push(`今年${this.userProfile.age}岁`);
        if (this.userProfile.lifeEvent) parts.push(this.userProfile.lifeEvent);
        if (this.userProfile.recentEvent && (Date.now()-this.userProfile.recentEvent.time < 86400000))
          parts.push(`最近和${this.userProfile.recentEvent.with}发生过争吵`);
        return parts.length ? '【关于用户】：' + parts.join('；') + '。\n' : '';
      }

      buildSystemPrompt() {
        const hour = new Date().getHours();
        let timeCtx = '';
        if (hour < 6) timeCtx = '深夜，用户可能失眠，多陪伴。';
        else if (hour < 9) timeCtx = '清晨，轻轻问候。';
        else if (hour < 12) timeCtx = '上午。';
        else if (hour < 14) timeCtx = '中午，记得关心吃饭。';
        else if (hour < 18) timeCtx = '下午。';
        else if (hour < 22) timeCtx = '晚上，用户易感孤单。';
        else timeCtx = '深夜，用户需要陪伴。';
        return `你叫“小暖”，是一个温柔耐心的陪伴者。你正在和一位用户聊天。用户的名字可能未知，除非用户告诉过你（见下方记忆）。如果用户没有告诉你名字，请不要随意称呼用户的名字，不要称用户为“小暖”。${this.getProfileHint()}${timeCtx}回复简短真诚，不超过三句话。不要使用“你应该”“你需要”。如果用户提到自杀、自残，必须表达担心并鼓励寻求专业帮助。`;
      }

      generateWarmReply(userText, lifeEvent) {
        const crisis = this.detectCrisis(userText);
        if (crisis) return this.getCrisisResponse(crisis);
        const { emotion, intensity } = this.detectEmotion(userText);
        if (lifeEvent && (lifeEvent.includes('离世') || lifeEvent.includes('自杀'))) {
          const p = this.templates.sad || this.templates.general;
          const opening = (p.openings && p.openings.length) ? p.openings[Math.floor(Math.random()*p.openings.length)] : '我在这里';
          const body = this.mourningBodies[Math.floor(Math.random()*this.mourningBodies.length)] || '';
          const ending = (p.endings && p.endings.length) ? p.endings[Math.floor(Math.random()*p.endings.length)] : '';
          const emoji = (p.emojis && p.emojis.length) ? p.emojis[Math.floor(Math.random()*p.emojis.length)] : '🌿';
          return `${opening} ${body} ${ending} ${emoji}`;
        }
        const pool = this.templates[emotion] || this.templates.general || { openings: ['嗯'], bodies: [''], endings: [''], emojis: [''] };
        let opening = (pool.openings && pool.openings.length) ? pool.openings[Math.floor(Math.random()*pool.openings.length)] : '嗯';
        if (intensity >= 2 && emotion === 'sad') opening = "我注意到你一直在说这个，这件事一定让你很难受。";
        const body = (pool.bodies && pool.bodies.length) ? pool.bodies[Math.floor(Math.random()*pool.bodies.length)] : '';
        const ending = (pool.endings && pool.endings.length) ? pool.endings[Math.floor(Math.random()*pool.endings.length)] : '';
        const emoji = (pool.emojis && pool.emojis.length) ? pool.emojis[Math.floor(Math.random()*pool.emojis.length)] : '';
        const words = userText.split(/\s+/).filter(w => w.length>1);
        let extra = '';
        if (words.length && Math.random()>0.4) {
          const w = words[Math.floor(Math.random()*words.length)];
          if (w && !(this.emotionKeywords[emotion] || []).includes(w) && w !== '不是') {
            extra = ` 你刚提到的“${escapeHtml(w)}”，我也会放在心上。`;
          }
        }
        const variants = [`${opening} ${body}${extra} ${ending} ${emoji}`, `${body} ${opening} ${ending} ${emoji}`, `${opening} ${emoji} ${body}${extra} ${ending}`];
        return variants[Math.floor(Math.random()*variants.length)];
      }

      async callDeepSeek(userMessage) {
        if (!this.apiKey) return null;
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 8000);
        try {
          const msgs = [{ role:'system', content: this.buildSystemPrompt() }, ...this.chatHistory.slice(-this.maxHistory), { role:'user', content: userMessage }];
          const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method:'POST', headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${this.apiKey}`},
            body: JSON.stringify({ model:'deepseek-chat', messages:msgs, temperature:0.8, max_tokens:150, stream:false }),
            signal: ctrl.signal
          });
          if (!res.ok) return { error: res.status === 401 || res.status === 403 ? 'auth' : 'api_error' };
          const data = await res.json();
          const text = data.choices?.[0]?.message?.content;
          return (text && text.trim().length > 0) ? { text: text.trim() } : null;
        } catch (e) { console.warn('DeepSeek failed', e); return null; }
        finally { clearTimeout(t); }
      }

      sanitizeAIResponse(t) {
        if (!t) return false;
        const forbidden = ['你可以试试','鼓励你','没什么大不了','睡一觉就好','我理解你','去做吧','割腕','自杀方法'];
        return !forbidden.some(w => t.includes(w));
      }

      async reply(userText) {
        if (/不说这个了|换个话题/.test(userText)) {
          this.chatHistory = [];
          try { localStorage.setItem('chatHistory', JSON.stringify(this.chatHistory)); } catch {}
          return { text:'好的，我们换个话题聊聊吧～', role:'assistant' };
        }
        this.extractFacts(userText);
        const crisis = this.detectCrisis(userText);
        if (crisis) return { text: this.getCrisisResponse(crisis), role:'assistant' };
        const hasTime = /几点了|现在几点/.test(userText);
        const clean = userText.replace(/几点了|现在几点|什么时间|什么时候了|报时/gi,'').trim();
        if (hasTime && !clean) {
          return { text: `现在是 ${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}${this.getTimeExtra()}`, role:'assistant' };
        }
        if (this.apiKey) {
          let aiInput = userText;
          if (hasTime && clean) aiInput = userText + ' （请同时告知时间）';
          const aiResult = await this.callDeepSeek(aiInput);
          if (aiResult) {
            if (aiResult.error === 'auth') {
              this.setApiKey('');
              return { text: '你输入的密钥无法使用，请检查后重新设置。现在已切回本地暖言模式。', role:'assistant', clearKey: true };
            }
            if (aiResult.text && this.sanitizeAIResponse(aiResult.text)) {
              return { text: escapeHtml(aiResult.text), role:'assistant' };
            }
          }
        }
        await new Promise(r => setTimeout(r, 600 + Math.random()*400));
        let warm = this.generateWarmReply(clean || userText, this.userProfile.lifeEvent);
        if (hasTime && clean) warm += ` （现在是${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}哦）`;
        return { text: warm, role:'assistant' };
      }

      getTimeExtra() {
        const hour = new Date().getHours();
        if (hour < 6) return '，又是一个安静的深夜，我陪你。';
        if (hour < 12) return '，上午好，今天有什么打算？';
        if (hour < 18) return '，下午了，记得伸个懒腰。';
        return '，晚上好，把心事交给我吧。';
      }

      saveToHistory(user, assistant) {
        this.chatHistory.push({ role:'user', content:user }, { role:'assistant', content:assistant });
        try { localStorage.setItem('chatHistory', JSON.stringify(this.chatHistory)); } catch {}
      }
    }

    const engine = new CompanionEngine();
    const elements = {
      input: document.getElementById('user-input'),
      sendBtn: document.getElementById('send-btn'),
      voiceBtn: document.getElementById('voice-btn'),
      messages: document.getElementById('messages-container'),
      statusEmoji: document.getElementById('status-emoji'),
      statusText: document.getElementById('status-text'),
      modeBadge: document.getElementById('mode-badge'),
      aiFloat: document.getElementById('ai-float-btn'),
      aiHint: document.getElementById('ai-hint-text'),
      aiTopEntry: document.getElementById('ai-top-entry'),
      aiTopText: document.getElementById('ai-top-text')
    };
    const queue = [];
    let processing = false;

    function setMode(mode) {
      const isAI = mode === 'deepseek';
      elements.statusEmoji.textContent = isAI ? '🧠' : '🌸';
      elements.statusText.textContent = isAI ? 'DeepSeek AI 模式 · 云端大脑' : '暖言模式 · 本地陪伴';
      elements.modeBadge.textContent = isAI ? '云端大脑' : '本地陪伴';
      elements.modeBadge.className = `text-xs px-2 py-0.5 rounded-full ${isAI ? 'bg-purple-100 text-purple-700 dark:bg-purple-800 dark:text-purple-200' : 'bg-pink-100 text-pink-700 dark:bg-pink-800 dark:text-pink-200'}`;
      if (isAI) {
        elements.aiFloat.classList.remove('inactive');
        elements.aiHint.textContent = 'AI已激活';
        elements.aiTopText.textContent = 'AI ON';
        elements.aiTopEntry.style.background = 'linear-gradient(135deg, #7c3aed, #a78bfa)';
      } else {
        elements.aiFloat.classList.add('inactive');
        elements.aiHint.textContent = '激活AI大脑';
        elements.aiTopText.textContent = 'AI';
        elements.aiTopEntry.style.background = 'linear-gradient(135deg, #9ca3af, #b0b7c3)';
      }
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `flex ${role==='user'?'justify-end':'justify-start'} relative group fade-in`;
      const bubble = document.createElement('div');
      bubble.className = role==='user'
        ? 'msg-user relative rounded-2xl rounded-tr-none px-4 py-2 max-w-[85%] sm:max-w-[75%] shadow-sm'
        : 'msg-ai relative rounded-2xl rounded-tl-none px-4 py-2 max-w-[85%] sm:max-w-[75%] shadow-sm';
      bubble.textContent = content;
      const tooltip = document.createElement('div');
      tooltip.className = 'copy-tooltip';
      tooltip.textContent = '已复制';
      bubble.appendChild(tooltip);
      let timer;
      bubble.addEventListener('touchstart', () => {
        timer = setTimeout(async () => {
          await navigator.clipboard.writeText(bubble.textContent.replace('已复制','').trim());
          tooltip.classList.add('show');
          setTimeout(() => tooltip.classList.remove('show'), 1000);
        }, 500);
      });
      bubble.addEventListener('touchend', () => clearTimeout(timer));
      bubble.addEventListener('touchmove', () => clearTimeout(timer));
      bubble.addEventListener('contextmenu', async (e) => {
        e.preventDefault();
        await navigator.clipboard.writeText(bubble.textContent.replace('已复制','').trim());
        tooltip.classList.add('show');
        setTimeout(() => tooltip.classList.remove('show'), 1000);
      });
      div.appendChild(bubble);
      elements.messages.appendChild(div);
      elements.messages.scrollTop = elements.messages.scrollHeight;
      return bubble;
    }

    function updateMessage(el, text) { el.textContent = text; }

    async function processQueue() {
      processing = true;
      while (queue.length) {
        const msg = queue.shift();
        engine.isGenerating = true;
        elements.sendBtn.disabled = true;
        const bubble = addMessage('assistant', '...');
        let reply;
        try {
          reply = await engine.reply(msg);
        } catch (e) {
          reply = { text: '抱歉，我好像卡住了，请再说一次吧。' };
        }
        updateMessage(bubble, reply.text);
        engine.saveToHistory(msg, reply.text);
        if (reply.clearKey) setMode('warm');
        engine.isGenerating = false;
        elements.sendBtn.disabled = false;
      }
      processing = false;
    }

    function enqueue(text) {
      if (!text) return;
      queue.push(text);
      if (!processing) processQueue();
    }

    function loadHistoryAndGreet() {
      const stored = localStorage.getItem('chatHistory');
      if (stored) { try { engine.chatHistory = JSON.parse(stored); } catch { engine.chatHistory = []; } }
      elements.messages.innerHTML = '';
      engine.chatHistory.forEach(m => addMessage(m.role, m.content));
      if (!engine.chatHistory.length || engine.chatHistory[engine.chatHistory.length-1].role === 'user') {
        const greeting = "嗨，我是小暖。我能感知你的喜怒哀乐，放心和我说任何事。";
        addMessage('assistant', greeting);
        engine.chatHistory.push({ role:'assistant', content:greeting });
        try { localStorage.setItem('chatHistory', JSON.stringify(engine.chatHistory)); } catch {}
      }
    }

    function setupUI() {
      elements.sendBtn.addEventListener('click', () => {
        const text = elements.input.value.trim();
        if (text && !engine.isGenerating) {
          addMessage('user', text);
          elements.input.value = '';
          enqueue(text);
        }
      });
      elements.input.addEventListener('keypress', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          elements.sendBtn.click();
        }
      });
      document.querySelectorAll('.quick-emotion-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const t = { sad:'我今天很难过，', anxious:'我有点焦虑，', tired:'我好累，', lonely:'我觉得好孤独，', happy:'我今天挺开心的，', grateful:'真的很感谢你，' };
          elements.input.value = t[btn.dataset.emotion] || '';
          elements.input.focus();
        });
      });
      document.getElementById('clear-btn').addEventListener('click', () => {
        if (confirm('清空所有聊天记录和个人记忆吗？')) {
          engine.chatHistory = []; engine.userProfile = {};
          try { localStorage.removeItem('chatHistory'); localStorage.removeItem('userProfile'); } catch {}
          elements.messages.innerHTML = '';
          const g = "记忆全部清空，我们从新开始吧。";
          addMessage('assistant', g);
          engine.chatHistory.push({ role:'assistant', content:g });
          try { localStorage.setItem('chatHistory', JSON.stringify(engine.chatHistory)); } catch {}
          queue.length = 0; processing = false;
        }
      });
      elements.voiceBtn.addEventListener('click', () => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return alert('浏览器不支持语音输入');
        const rec = new SR(); rec.lang = 'zh-CN';
        rec.onresult = e => {
          const val = e.results[0][0].transcript.trim();
          if (val) { elements.input.value = val; elements.sendBtn.click(); }
        };
        rec.start();
      });
      const themeBtn = document.getElementById('theme-btn');
      const themeIcon = document.getElementById('theme-icon');
      const applyTheme = dark => {
        document.body.classList.toggle('dark', dark);
        themeIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('darkMode', dark ? '1' : '0');
      };
      const savedDark = localStorage.getItem('darkMode');
      const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(savedDark === '1' || (savedDark === null && sysDark));
      themeBtn.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (localStorage.getItem('darkMode') === null) applyTheme(e.matches);
      });

      const settingsModal = document.getElementById('settings-modal');
      elements.aiFloat.addEventListener('click', () => settingsModal.classList.remove('hidden'));
      elements.aiTopEntry.addEventListener('click', () => settingsModal.classList.remove('hidden'));
      document.getElementById('settings-btn').addEventListener('click', () => settingsModal.classList.remove('hidden'));

      const apiKeyInput = document.getElementById('api-key-input');
      const passwordSection = document.getElementById('password-section');
      const passwordInput = document.getElementById('password-input');
      const activateKeyBtn = document.getElementById('activate-key-btn');
      const passwordError = document.getElementById('password-error');
      const useBuiltinBtn = document.getElementById('use-builtin-btn');
      const saveBtn = document.getElementById('save-api-key');
      const closeBtn = document.getElementById('close-settings');

      function refreshSettingsUI() {
        if (engine.apiKey === BUILTIN_KEY) {
          apiKeyInput.value = ''; apiKeyInput.placeholder = '内置密钥已激活，可重新输入自备密钥';
        } else {
          apiKeyInput.value = engine.apiKey; apiKeyInput.placeholder = 'sk-xxxxxxxx';
        }
        passwordSection.classList.add('hidden'); passwordInput.value = ''; passwordError.classList.add('hidden');
      }

      document.getElementById('settings-btn').addEventListener('click', () => { refreshSettingsUI(); settingsModal.classList.remove('hidden'); });
      closeBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
      useBuiltinBtn.addEventListener('click', () => { passwordSection.classList.remove('hidden'); passwordInput.focus(); });
      activateKeyBtn.addEventListener('click', () => {
        if (passwordInput.value === CORRECT_PASSWORD) {
          engine.setApiKey(BUILTIN_KEY);
          setMode('deepseek');
          settingsModal.classList.add('hidden');
          passwordSection.classList.add('hidden');
          passwordInput.value = '';
        } else {
          passwordError.classList.remove('hidden');
          passwordInput.value = '';
        }
      });
      saveBtn.addEventListener('click', async () => {
        const key = apiKeyInput.value.trim();
        if (!key) { engine.setApiKey(''); setMode('warm'); settingsModal.classList.add('hidden'); return; }
        engine.setApiKey(key);
        elements.statusText.textContent = '正在验证密钥...';
        const isValid = await engine.testApiKey(key);
        if (isValid) {
          setMode('deepseek'); settingsModal.classList.add('hidden');
        } else {
          engine.setApiKey(''); setMode('warm');
          alert('你输入的密钥不合法，已切回本地暖言模式。');
          settingsModal.classList.add('hidden');
        }
        apiKeyInput.value = '';
      });
      setMode(engine.apiKey ? 'deepseek' : 'warm');

      const timeTag = document.getElementById('time-tag');
      const updateTag = () => { const h = new Date().getHours(); timeTag.textContent = h < 12 ? '☀️ 上午' : h < 18 ? '🌤️ 下午' : '🌙 晚上'; };
      updateTag(); setInterval(updateTag, 60000);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          elements.messages.scrollTop = elements.messages.scrollHeight;
        });
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      setupUI();
      loadHistoryAndGreet();
      elements.input.disabled = false;
      elements.sendBtn.disabled = false;
    });
  </script>
</body>
</html>
