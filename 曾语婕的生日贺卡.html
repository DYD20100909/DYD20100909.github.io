<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎂 曾语婕 · 诗意与物理的生日宇宙</title>
    <style>
        :root {
            --color-misty-pink: #FFB6C1;
            --color-mint-green: #98FB98;
            --color-deep-bg: #0a1a0f;
            --color-surface: #1a2a1a;
            --color-gold: #fbe8a5;
            --color-warm-brown: #aa7a55;
            --color-cream: #fffaf3;
            --color-flame-center: #fffef0;
            --color-flame-mid: #ffeaa0;
            --color-flame-outer: #ffb840;
            --color-flame-edge: #ff6a20;
            --color-tier1: #ff8c5a;
            --color-tier1-bottom: #e3602e;
            --color-tier1-shadow: #b23b10;
            --color-tier2: #ffe4a5;
            --color-tier2-bottom: #f7c56e;
            --color-tier2-shadow: #c8993a;
            --color-tier3: #ffc8e4;
            --color-tier3-bottom: #f290b8;
            --color-tier3-shadow: #c06080;
            --color-envelope-light: #fef5e8;
            --color-envelope-mid: #fce9d9;
            --color-envelope-dark: #f8dfc8;
            --color-envelope-fold: #d4b896;
            --color-seal-light: #f5e6c4;
            --color-seal-mid: #e8cf9e;
            --color-seal-dark: #d4a870;
            --font-size-title: clamp(1.8rem, 8vw, 4rem);
            --font-size-blessing: clamp(0.85rem, 3vw, 1rem);
            --font-size-btn: clamp(1rem, 3.5vw, 1.2rem);
            --shadow-envelope: 0 20px 38px rgba(0, 0, 0, 0.4);
            --shadow-heavy: 0 18px 40px rgba(0, 0, 0, 0.45);
            --transition-smooth: 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        html { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        body {
            min-height:100vh; min-height:100dvh; overflow:hidden;
            font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
            background:radial-gradient(ellipse at 40% 50%, var(--color-surface), var(--color-deep-bg));
            position:relative; transform:translateZ(0); backface-visibility:hidden; touch-action:manipulation;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background: radial-gradient(circle at 25% 30%, rgba(255,182,193,0.12) 0%, transparent 50%),
                        radial-gradient(circle at 70% 55%, rgba(144,238,144,0.10) 0%, transparent 48%),
                        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04) 0%, transparent 70%),
                        radial-gradient(circle at 60% 20%, rgba(255,105,180,0.08) 0%, transparent 42%);
            pointer-events:none; z-index:0;
        }

        @supports not (backdrop-filter: blur(1px)) {
            .home-page { background:rgba(10,25,15,0.78) !important; }
            .blessing-text { background:rgba(0,0,0,0.55) !important; }
            .signature { background:rgba(0,0,0,0.5) !important; }
        }

        @media (prefers-reduced-motion: reduce) {
            .star-big,.star-small { animation:none !important; opacity:0.7; }
            .flame { animation:none !important; opacity:0.9; }
            .meteor { animation:none !important; display:none; }
            .confetti { animation-duration:0.5s !important; }
            .blessing-title,.cake-top-msg span,.birthday-cheer .cheer-text { animation:none !important; }
            .envelope-flap { transition:transform 0.5s ease !important; }
            .letter-layer.show { animation-duration:1.5s !important; }
        }

        .star-scene { position:fixed; inset:0; opacity:0; visibility:hidden; transition:opacity 1.8s ease; z-index:5; pointer-events:none; }
        .star-scene.show { opacity:1; visibility:visible; }
        .star-layer { position:absolute; width:100%; height:100%; }
        .star-big,.star-small { position:absolute; background:#fff5e0; border-radius:50%; will-change:opacity,transform; }
        .star-big { width:3px; height:3px; box-shadow:0 0 7px #ffdd99; animation:twinkleBig 4s ease-in-out infinite; }
        .star-small { width:2px; height:2px; animation:twinkleSmall 2.8s ease-in-out infinite; }
        @keyframes twinkleBig { 0%,100%{opacity:0.4;transform:scale(1);} 50%{opacity:1;transform:scale(1.35);} }
        @keyframes twinkleSmall { 0%,100%{opacity:0.3;} 50%{opacity:0.9;} }
        .meteor { position:absolute; width:2px; height:2px; background:#ffefc0; border-radius:50%; opacity:0; transform:rotate(-30deg); pointer-events:none; }
        .meteor::after { content:''; position:absolute; width:90px; height:2px; background:linear-gradient(90deg,#ffe2a3,transparent); top:0; left:0; transform:translateX(-100%); }
        @keyframes meteorFall { 0%{opacity:0;transform:rotate(-30deg) translate(0,0);} 15%{opacity:1;} 100%{opacity:0;transform:rotate(-30deg) translate(-450px,450px);} }

        .home-page { position:fixed; inset:0; display:flex; justify-content:center; align-items:center; z-index:100; backdrop-filter:blur(12px); background:rgba(10,25,15,0.55); transition:opacity 0.7s ease, visibility 0.7s ease; }
        .home-page.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .open-btn { padding:18px 56px; font-size:1.5rem; font-weight:600; color:#fff9f0; background:linear-gradient(135deg,#c49a7c,#e8b896); border:none; border-radius:80px; cursor:pointer; box-shadow:0 18px 38px rgba(0,0,0,0.55),0 0 32px rgba(255,182,193,0.5); letter-spacing:6px; transition:transform var(--transition-smooth),box-shadow var(--transition-smooth); min-height:44px; }
        .open-btn:hover { transform:scale(1.06); box-shadow:0 22px 48px rgba(0,0,0,0.65),0 0 55px #ffb6c1; }
        .open-btn:active { transform:scale(0.96); }
        .open-btn:focus-visible { outline:3px solid #ffb6c1; outline-offset:4px; }

        .envelope-layer { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(0); width:min(360px,82vw); aspect-ratio:360/250; opacity:0; visibility:hidden; transition:transform 0.8s cubic-bezier(0.34,1.2,0.64,1),opacity 0.55s; filter:drop-shadow(0 0 14px rgba(255,182,193,0.5)) drop-shadow(0 22px 32px rgba(0,0,0,0.45)); z-index:10; perspective:800px; will-change:transform,opacity; }
        .envelope-layer.show { transform:translate(-50%,-50%) scale(1); opacity:1; visibility:visible; }
        .envelope-layer:hover { transform:translate(-50%,-50%) scale(1.04); filter:drop-shadow(0 0 30px rgba(255,182,193,0.7)) drop-shadow(0 26px 38px rgba(0,0,0,0.55)); transition:transform 0.3s ease,filter 0.3s; }
        .envelope { position:relative; width:100%; height:100%; cursor:pointer; background:transparent; border:none; display:block; }
        .envelope:focus-visible { outline:3px solid #ffb6c1; outline-offset:6px; border-radius:28px; }
        .envelope-body { position:absolute; bottom:0; left:0; width:100%; height:80%; background:linear-gradient(175deg,var(--color-envelope-light),var(--color-envelope-mid),var(--color-envelope-dark)); border-radius:0 0 28px 28px; box-shadow:inset 0 2px 6px rgba(255,255,255,0.75),inset 0 -8px 0 var(--color-envelope-fold),var(--shadow-envelope); z-index:2; }
        .envelope-flap { position:absolute; top:0; left:0; width:100%; height:55%; background:linear-gradient(175deg,#fffef9,#fdf2e4,#f5e0ca); clip-path:polygon(0% 0%,50% 100%,100% 0%); z-index:4; transform-origin:top center; transition:transform 1.45s cubic-bezier(0.4,0,0.2,1); box-shadow:0 14px 28px rgba(0,0,0,0.32); will-change:transform; }
        .envelope-flap.open { transform:rotateX(180deg); box-shadow:0 -10px 20px rgba(0,0,0,0.25); }
        .envelope-inner { position:absolute; top:10%; left:4%; right:4%; height:65%; background:var(--color-cream); border-radius:15px; z-index:1; opacity:0; display:flex; align-items:center; justify-content:center; text-align:center; font-size:clamp(0.8rem,3vw,0.95rem); color:var(--color-warm-brown); line-height:1.7; box-shadow:inset 0 0 0 1px rgba(180,150,120,0.2); padding:10px; pointer-events:none; }
        .envelope-flap.open + .envelope-inner { opacity:1; animation:linerFadeOut 1.2s ease 1.8s forwards; }
        @keyframes linerFadeOut { 0%{opacity:1; filter:blur(0);} 100%{opacity:0; filter:blur(8px);} }
        .envelope-seal { position:absolute; bottom:33%; left:50%; transform:translateX(-50%); width:14%; aspect-ratio:1; max-width:54px; background:radial-gradient(circle at 42% 32%,var(--color-seal-light),var(--color-seal-dark)); border-radius:50%; z-index:5; cursor:pointer; box-shadow:0 7px 16px rgba(0,0,0,0.52),inset 0 -3px 7px rgba(0,0,0,0.28),inset 0 3px 9px rgba(255,255,240,0.85); display:flex; align-items:center; justify-content:center; font-size:clamp(14px,4vw,20px); color:var(--color-gold); text-shadow:0 1px 3px #7b5530; transition:box-shadow 0.3s,filter 0.3s; pointer-events:auto; }
        .envelope-seal::before { content:"★"; }
        .envelope-seal.bouncing { animation:sealBounce 0.4s ease; }
        @keyframes sealBounce { 0%{transform:translateX(-50%) scale(1);} 35%{transform:translateX(-50%) scale(1.18);} 65%{transform:translateX(-50%) scale(0.92);} 100%{transform:translateX(-50%) scale(1);} }
        .envelope-flap.open ~ .envelope-seal { transform:translateX(-50%) scale(0) rotate(360deg); opacity:0; transition:transform 0.45s ease 0.9s,opacity 0.4s ease 0.9s; pointer-events:none; }
        @keyframes envelopeShake { 0%,100%{transform:translate(-50%,-50%) scale(1);} 25%{transform:translate(-50%,-50%) scale(0.97) rotate(-0.6deg);} 75%{transform:translate(-50%,-50%) scale(0.97) rotate(0.6deg);} }
        .envelope-layer.shake { animation:envelopeShake 0.35s ease-out; }

        .letter-layer { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(0.82); width:min(320px,78vw); aspect-ratio:320/240; opacity:0; z-index:12; pointer-events:none; filter:blur(1.5px); visibility:hidden; }
        .letter-layer.show { visibility:visible; opacity:1; animation:letterRise 5.5s cubic-bezier(0.22,0.9,0.32,1.15) forwards; }
        @keyframes letterRise { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.82) translateY(20px);filter:blur(1.5px);} 12%{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0);filter:blur(0);} 65%{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(-15px);filter:blur(0);} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.02) translateY(-130px);filter:blur(4px);} }
        .letter { width:100%; height:100%; background:linear-gradient(175deg,#fffef8,#fdf5ec,#f9ebdb); border-radius:6px; box-shadow:var(--shadow-heavy); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .letter p { color:var(--color-warm-brown); font-size:clamp(0.9rem,3.8vw,1.05rem); line-height:1.9; }
        .letter-line { width:55%; height:1.5px; background:linear-gradient(90deg,transparent,#d4b896,transparent); margin:10px 0; }

        .message-layer { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; z-index:16; opacity:0; visibility:hidden; transition:opacity 1s ease 0.3s; width:88%; max-width:700px; pointer-events:none; }
        .message-layer.show { opacity:1; visibility:visible; pointer-events:auto; }
        .blessing-title { font-size:var(--font-size-title); color:#fff3e8; text-shadow:0 0 22px #ffbc7a,0 0 48px #ff9f44; letter-spacing:5px; margin-bottom:18px; animation:titleGlow 2.6s ease-in-out infinite; }
        @keyframes titleGlow { 0%,100%{text-shadow:0 0 16px #ffb66b,0 0 32px #ffa54d;} 50%{text-shadow:0 0 30px #ffdaa5,0 0 60px #ffb347;} }
        .blessing-text { font-size:var(--font-size-blessing); color:#fff7ec; line-height:1.8; background:rgba(0,0,0,0.35); backdrop-filter:blur(10px); display:inline-block; padding:14px 30px; border-radius:60px; border:1px solid rgba(255,255,255,0.12); }
        .claim-btn { margin-top:42px; padding:14px 50px; font-size:var(--font-size-btn); font-weight:bold; background:linear-gradient(145deg,#c47b9b,#e89f6e); border:none; border-radius:60px; color:#fff3e4; cursor:pointer; box-shadow:0 12px 30px rgba(0,0,0,0.45),0 0 22px rgba(255,160,100,0.4); transition:transform var(--transition-smooth),box-shadow var(--transition-smooth); min-height:44px; }
        .claim-btn:hover { transform:scale(1.05); box-shadow:0 0 32px #ffaa70; }
        .claim-btn:focus-visible { outline:3px solid #ffb6c1; outline-offset:4px; }
        .claim-btn.disabled { pointer-events:none; opacity:0.5; filter:grayscale(20%); }
        .skip-btn { position:fixed; top:16px; right:16px; z-index:90; background:rgba(0,0,0,0.4); color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:6px 16px; font-size:0.8rem; cursor:pointer; opacity:0; transition:opacity 0.4s; pointer-events:none; font-family:inherit; letter-spacing:1px; }
        .skip-btn.visible { opacity:1; pointer-events:auto; }
        .skip-btn:hover { background:rgba(0,0,0,0.6); color:#fff; }

        #particleCanvas { position:fixed; inset:0; z-index:20; pointer-events:none; opacity:0; transition:opacity 0.3s; }
        #particleCanvas.active { opacity:1; }

        .cake-morph-layer { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(0); width:min(240px,58vw); aspect-ratio:240/280; z-index:21; opacity:0; visibility:hidden; transition:transform 0.5s cubic-bezier(0.34,1.2,0.64,1),opacity 0.35s; pointer-events:none; }
        .cake-morph-layer.show { transform:translate(-50%,-50%) scale(1); opacity:1; visibility:visible; }
        .morph-cake { width:100%; height:100%; background:rgba(6,18,16,0.92); border:2.5px solid #55ffaa; border-radius:32px; box-shadow:0 0 48px #33ff99,inset 0 0 20px rgba(102,255,170,0.22); display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:7%; }
        .morph-tier { width:90%; height:12%; margin-bottom:3%; background:rgba(100,255,150,0.2); border:1.5px solid #5affa0; box-shadow:0 0 12px #2eff8c; border-radius:5px; }
        .morph-tier:nth-child(1){width:94%;height:14%;} .morph-tier:nth-child(2){width:79%;height:11%;} .morph-tier:nth-child(3){width:63%;height:10%;}
        .morph-candle { width:5%; height:18%; background:#d0ffbc; border:1.5px solid #5eff8c; margin-top:4%; box-shadow:0 0 14px #33ff99; border-radius:5px; }
        @keyframes morphShrink { 0%{transform:scale(1);opacity:1;filter:brightness(1) hue-rotate(0deg);} 100%{transform:scale(0.68);opacity:0;filter:brightness(2.2) hue-rotate(55deg);} }
        .cake-morph-layer.show .morph-cake { animation:morphShrink 1.05s ease-out forwards; }

        .cake-layer { position:fixed; left:50%; top:48%; transform:translate(-50%,-50%) scale(0); z-index:22; opacity:0; visibility:hidden; transition:transform 0.8s cubic-bezier(0.34,1.2,0.64,1),opacity 0.5s; }
        .cake-layer.show { transform:translate(-50%,-50%) scale(1); opacity:1; visibility:visible; }
        .cake-container { position:relative; width:min(280px,68vw); aspect-ratio:280/320; }
        .cake-tier1,.cake-tier2,.cake-tier3 { position:absolute; left:50%; transform:translateX(-50%); }
        .cake-tier1 { bottom:0; width:88%; height:28%; background:linear-gradient(155deg,var(--color-tier1),var(--color-tier1-bottom)); border-radius:20px 20px 34px 34px; box-shadow:inset 0 -9px 0 var(--color-tier1-shadow),0 14px 28px rgba(0,0,0,0.42); }
        .cake-tier2 { bottom:27%; width:74%; height:24%; background:linear-gradient(155deg,var(--color-tier2),var(--color-tier2-bottom)); border-radius:18px; box-shadow:inset 0 -7px 0 var(--color-tier2-shadow),0 10px 20px rgba(0,0,0,0.34); }
        .cake-tier3 { bottom:50%; width:58%; height:21%; background:linear-gradient(155deg,var(--color-tier3),var(--color-tier3-bottom)); border-radius:16px; box-shadow:inset 0 -6px 0 var(--color-tier3-shadow); }
        .cake-top-msg { position:absolute; bottom:72%; left:50%; transform:translateX(-50%); text-align:center; z-index:5; white-space:nowrap; }
        .cake-top-msg span { display:block; font-size:clamp(0.7rem,3.5vw,0.95rem); font-weight:700; color:#fffde8; text-shadow:0 0 10px #ffaa44,0 0 22px #ff8800; animation:nameGlow 1.8s ease-in-out infinite alternate; }
        .cake-top-msg span:last-child { font-size:clamp(0.6rem,3vw,0.8rem); margin-top:1px; }
        @keyframes nameGlow { from{text-shadow:0 0 8px #ffaa44,0 0 18px #ff8800;} to{text-shadow:0 0 16px #ffcc77,0 0 32px #ff9900,0 0 48px #ff6600;} }
        .cream { position:absolute; width:8%; aspect-ratio:1; background:#fffae9; border-radius:50%; box-shadow:0 3px 7px rgba(0,0,0,0.22); }
        .cream-1{bottom:54%;left:calc(50% - 29% + 3%);} .cream-2{bottom:54%;left:50%;transform:translateX(-50%);} .cream-3{bottom:54%;right:calc(50% - 29% + 3%);}
        .cream-4{bottom:31%;left:calc(50% - 37% + 4%);} .cream-5{bottom:31%;left:50%;transform:translateX(-50%);} .cream-6{bottom:31%;right:calc(50% - 37% + 4%);}
        .cream-7{bottom:6%;left:calc(50% - 44% + 5%);} .cream-8{bottom:6%;left:50%;transform:translateX(-50%);} .cream-9{bottom:6%;right:calc(50% - 44% + 5%);}
        .candle-stick { position:absolute; bottom:74%; left:50%; transform:translateX(-50%); width:5%; height:16%; background:linear-gradient(90deg,#ff7790,#e8436e); border-radius:8px; box-shadow:0 7px 14px rgba(0,0,0,0.32); z-index:3; }
        .flame { position:absolute; top:-28%; left:50%; transform:translateX(-50%); width:200%; height:200%; background:radial-gradient(circle at 50% 35%,var(--color-flame-center) 0%,var(--color-flame-mid) 25%,var(--color-flame-outer) 60%,var(--color-flame-edge) 100%); border-radius:55% 45% 55% 45% / 65% 60% 40% 35%; animation:flicker 0.14s ease-in-out infinite alternate; box-shadow:0 0 28px #ffae55,0 0 55px rgba(255,170,60,0.55); z-index:4; }
        @keyframes flicker { 0%{transform:translateX(-50%) scale(1) rotate(-2.5deg);opacity:0.88;} 100%{transform:translateX(-50%) scale(0.9) rotate(2.5deg);opacity:1;} }
        .sparkle { position:absolute; width:3%; aspect-ratio:1; background:gold; border-radius:50%; animation:sparkGlow 2s infinite; }
        @keyframes sparkGlow { 0%,100%{opacity:0.3;transform:scale(1);} 50%{opacity:1;transform:scale(1.7);} }
        .sparkle1{top:38%;left:10%;} .sparkle2{top:28%;right:14%;animation-delay:0.6s;} .sparkle3{top:60%;left:16%;animation-delay:1.2s;} .sparkle4{top:52%;right:20%;animation-delay:1.5s;} .sparkle5{top:20%;left:22%;animation-delay:0.3s;} .sparkle6{top:45%;right:8%;animation-delay:1.8s;}
        .confetti { position:absolute; z-index:10; pointer-events:none; animation:confettiFall linear forwards; opacity:0; }
        @keyframes confettiFall { 0%{opacity:0;transform:translateY(-40px) rotate(0deg) scale(0.5);} 10%{opacity:1;transform:translateY(-20px) rotate(45deg) scale(1);} 90%{opacity:0.8;transform:translateY(260px) rotate(540deg) scale(0.7);} 100%{opacity:0;transform:translateY(300px) rotate(720deg) scale(0.3);} }
        .confetti-1{top:5%;left:10%;width:8px;height:8px;background:#ff6b6b;border-radius:2px;animation-duration:3.2s;animation-delay:0.2s;}
        .confetti-2{top:2%;left:30%;width:6px;height:6px;background:#ffd93d;border-radius:50%;animation-duration:3.6s;animation-delay:0.5s;}
        .confetti-3{top:8%;left:55%;width:7px;height:3px;background:#6bcb77;border-radius:1px;animation-duration:2.9s;animation-delay:0.8s;}
        .confetti-4{top:3%;left:72%;width:5px;height:5px;background:#ff8fab;border-radius:50%;animation-duration:3.4s;animation-delay:1.1s;}
        .confetti-5{top:6%;left:85%;width:8px;height:4px;background:#ffeaa7;border-radius:1px;animation-duration:3.0s;animation-delay:0.4s;}
        .confetti-6{top:1%;left:18%;width:6px;height:6px;background:#a29bfe;border-radius:50%;animation-duration:3.8s;animation-delay:1.4s;}
        .confetti-7{top:4%;left:45%;width:7px;height:7px;background:#fd79a8;border-radius:2px;animation-duration:3.3s;animation-delay:0.7s;}
        .confetti-8{top:7%;left:65%;width:5px;height:5px;background:#ffeaa7;border-radius:50%;animation-duration:3.1s;animation-delay:1.6s;}

        .birthday-cheer { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(0); text-align:center; z-index:35; opacity:0; transition:transform 0.55s cubic-bezier(0.34,1.2,0.64,1),opacity 0.4s; }
        .birthday-cheer.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
        .cheer-text { font-size:clamp(1.8rem,7vw,3.8rem); font-weight:800; color:#fff9c4; text-shadow:0 0 22px #ff4081,0 0 48px #ff9800,0 0 80px #ffeb3b; letter-spacing:4px; animation:cheerPulse 0.7s ease-in-out infinite alternate; }
        @keyframes cheerPulse { from{text-shadow:0 0 16px #ff4081,0 0 32px #ff9800;transform:scale(0.97);} to{text-shadow:0 0 38px #ff4081,0 0 75px #ff9800,0 0 110px #ffeb3b;transform:scale(1.06);} }

        .signature { position:fixed; bottom:22px; right:22px; font-size:clamp(0.75rem,3vw,1rem); color:#ffe6c7; letter-spacing:3px; background:rgba(0,0,0,0.35); padding:5px 16px; border-radius:40px; backdrop-filter:blur(4px); z-index:50; font-style:italic; }

        @media (max-width:380px) { .envelope-layer{width:min(320px,90vw);} .letter-layer{width:min(280px,85vw);} .cake-container{width:min(240px,75vw);} .open-btn{padding:14px 36px;font-size:1.15rem;letter-spacing:4px;} .envelope-seal{max-width:36px;font-size:0.85rem;} .cheer-text{white-space:normal;font-size:clamp(1.4rem,5.5vw,2.2rem);} .claim-btn{padding:12px 34px;font-size:0.95rem;} }
        @media (orientation:landscape) and (max-height:500px) { .envelope-layer{width:min(280px,35vh);} .cake-container{width:min(200px,30vh);} .letter-layer{width:min(240px,30vh);} .cheer-text{font-size:clamp(1.2rem,3vh,2rem);} .blessing-title{font-size:clamp(1.4rem,4vh,2.5rem);} .claim-btn{margin-top:16px;padding:10px 32px;font-size:0.9rem;} }
    </style>
</head>
<body>
    <canvas id="particleCanvas" aria-hidden="true"></canvas>
    <button class="skip-btn" id="skipBtn">⏭ 跳过</button>

    <div class="home-page" id="homePage"><button class="open-btn" id="openBtn">✨ 开启生日贺卡 ✨</button></div>

    <div class="envelope-layer" id="envelopeLayer">
        <button class="envelope" id="envelope" aria-label="点击打开信封">
            <div class="envelope-flap" id="envelopeFlap"></div>
            <div class="envelope-inner">✨ 愿所有美好如约而至 ✨<br>生日快乐，曾语婕<br><span style="font-size:0.9em;">给语文课代表 & 物理小天才</span></div>
            <div class="envelope-body"></div>
            <div class="envelope-seal" id="envelopeSeal"></div>
        </button>
    </div>

    <div class="letter-layer" id="letterLayer"><div class="letter"><div class="letter-line"></div><p>🎂 曾语婕，生辰喜乐 🎂<br>愿你以文字为舟，渡星河万里<br>以物理为翼，探宇宙无垠<br>所有的美好与真理，都将如约绽放</p><div class="letter-line"></div></div></div>

    <div class="star-scene" id="starScene"><div class="star-layer" id="starLayerBig"></div><div class="star-layer" id="starLayerSmall"></div><div class="meteor" id="m1"></div><div class="meteor" id="m2"></div><div class="meteor" id="m3"></div></div>

    <div class="message-layer" id="messageLayer"><h1 class="blessing-title">生日快乐 曾语婕</h1><p class="blessing-text">🌠 愿历遍山河 人间值得 🌠<br>岁岁常欢愉，年年皆胜意<br>永远赤诚，永远自由</p><button class="claim-btn" id="claimBtn">🎂 领取魔法蛋糕 🎂</button></div>

    <div class="cake-morph-layer" id="cakeMorphLayer"><div class="morph-cake"><div class="morph-tier"></div><div class="morph-tier"></div><div class="morph-tier"></div><div class="morph-candle"></div></div></div>

    <div class="cake-layer" id="cakeLayer"><div class="cake-container">
        <div class="cake-tier1"></div><div class="cake-tier2"></div><div class="cake-tier3"></div>
        <div class="cake-top-msg"><span>🎂 祝曾语婕 🎂</span><span>生日快乐！</span></div>
        <div class="cream cream-1"></div><div class="cream cream-2"></div><div class="cream cream-3"></div>
        <div class="cream cream-4"></div><div class="cream cream-5"></div><div class="cream cream-6"></div>
        <div class="cream cream-7"></div><div class="cream cream-8"></div><div class="cream cream-9"></div>
        <div class="candle-stick"><div class="flame"></div></div>
        <div class="sparkle sparkle1"></div><div class="sparkle sparkle2"></div><div class="sparkle sparkle3"></div><div class="sparkle sparkle4"></div><div class="sparkle sparkle5"></div><div class="sparkle sparkle6"></div>
        <div class="confetti confetti-1"></div><div class="confetti confetti-2"></div><div class="confetti confetti-3"></div><div class="confetti confetti-4"></div><div class="confetti confetti-5"></div><div class="confetti confetti-6"></div><div class="confetti confetti-7"></div><div class="confetti confetti-8"></div>
    </div></div>

    <div class="birthday-cheer" id="birthdayCheer"><div class="cheer-text">🎉 曾语婕，生日快乐！ 🎉</div></div>
    <div class="signature">— 杜彦德 敬赠 💝</div>

    <script>
        (() => {
            const D = {
                home: document.getElementById('homePage'), openBtn: document.getElementById('openBtn'),
                envLayer: document.getElementById('envelopeLayer'), envelope: document.getElementById('envelope'),
                flap: document.getElementById('envelopeFlap'), seal: document.getElementById('envelopeSeal'),
                letter: document.getElementById('letterLayer'), starScene: document.getElementById('starScene'),
                msgLayer: document.getElementById('messageLayer'), claimBtn: document.getElementById('claimBtn'),
                morph: document.getElementById('cakeMorphLayer'), cake: document.getElementById('cakeLayer'),
                cheer: document.getElementById('birthdayCheer'), starBig: document.getElementById('starLayerBig'),
                starSmall: document.getElementById('starLayerSmall'), meteors: document.querySelectorAll('.meteor'),
                skipBtn: document.getElementById('skipBtn'),
            };
            const TIMING = {
                ENVELOPE_SHOW_DELAY: 420, FLAP_OPEN_DELAY: 250, LETTER_RISE_DELAY: 700,
                LETTER_FALLBACK_TIMEOUT: 6200, MSG_FADE_DELAY: 320, MORPH_DURATION: 1050,
                CHEER_DURATION: 5000, METEOR_INTERVAL: 3200,
            };

            function initStars() {
                for(let i=0;i<28;i++){const s=document.createElement('div');s.className='star-big';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*4+'s';D.starBig.appendChild(s);}
                for(let i=0;i<50;i++){const s=document.createElement('div');s.className='star-small';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';D.starSmall.appendChild(s);}
            }
            let meteorTimer;
            function startMeteors() { if(meteorTimer) clearInterval(meteorTimer); meteorTimer=setInterval(()=>{if(!D.starScene.classList.contains('show'))return;const m=D.meteors[Math.floor(Math.random()*D.meteors.length)];m.style.top=Math.random()*35+'%';m.style.left=Math.random()*55+55+'%';m.style.animation='none';void m.offsetHeight;m.style.animation='meteorFall 2.5s linear forwards';},TIMING.METEOR_INTERVAL); }
            function stopMeteors() { if(meteorTimer){clearInterval(meteorTimer);meteorTimer=null;} }

            // ---- 优化后的生日歌：柔和三角波，双振荡器失谐，增益包络 ----
            const noteFreq = {
                'G4':392.00, 'A4':440.00, 'B4':493.88, 'C5':523.25, 'D5':587.33, 'E5':659.25,
                'F4':349.23, 'G5':783.99
            };
            const melody = [
                ['G4',500],['G4',500],['A4',700],['G4',700],['C5',700],['B4',1000],
                ['G4',500],['G4',500],['A4',700],['G4',700],['D5',700],['C5',1000],
                ['G4',500],['G4',500],['G5',700],['E5',700],['C5',500],['B4',500],['A4',1200],
                ['F4',500],['F4',500],['E5',700],['C5',700],['D5',700],['C5',1200]
            ];

            let audioCtx = null;
            function playSong() {
                if(!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        audioCtx.resume();
                    } catch(e) { return; }
                }
                const now = audioCtx.currentTime;
                let startTime = now;
                melody.forEach(([note, dur]) => {
                    const freq = noteFreq[note];
                    if(!freq) return;
                    const osc1 = audioCtx.createOscillator();
                    const osc2 = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc1.type = 'triangle';
                    osc2.type = 'triangle';
                    osc1.frequency.value = freq;
                    osc2.frequency.value = freq * 1.003; // 轻微失谐
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.22, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + dur/1000 - 0.05);
                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc1.start(startTime);
                    osc2.start(startTime);
                    osc1.stop(startTime + dur/1000);
                    osc2.stop(startTime + dur/1000);
                    startTime += dur/1000;
                });
            }

            // ---- Canvas 粒子系统 ----
            const canvas=document.getElementById('particleCanvas'), ctx=canvas.getContext('2d');
            const DPR_LIMIT=Math.min(devicePixelRatio||1,2); let CW,CH,particles=[],phase='idle',phaseStart=0,animId=null,onDone=null;
            function resizeCanvas(){ CW=innerWidth; CH=innerHeight; const dpr=navigator.hardwareConcurrency<=2?Math.min(DPR_LIMIT,1.5):DPR_LIMIT; canvas.width=CW*dpr; canvas.height=CH*dpr; canvas.style.width=CW+'px'; canvas.style.height=CH+'px'; ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr); }
            const tierSnippets={tier1:['F=G·(m₁m₂)/r²','Δx·Δp≥ℏ/2','E=hν','F=ma','p=mv','#include<universe>','"人生若只如初见"','"落霞与孤鹜齐飞"'],tier2:['E=mc²','"一身都是月"','v=λf','"且将新火试新茶"','class Wisdom{}','"诗酒趁年华"','"腹有诗书气自华"','F=-kx'],tier3:['🍰','🎂','∫dx','"星河"','"万里"','∑∞'],candle:['✨','∫','♥','{'],flame:['{','♥','⋅','∗']};
            function cakeTarget(tier,cx,cy,sf){let w,h,bY;switch(tier){case'tier1':w=250*sf;h=92*sf;bY=46*sf;break;case'tier2':w=210*sf;h=80*sf;bY=-36*sf;break;case'tier3':w=165*sf;h=70*sf;bY=-106*sf;break;case'candle':w=14*sf;h=52*sf;bY=-166*sf;break;case'flame':w=16*sf;h=22*sf;bY=-214*sf;break;default:w=250*sf;h=92*sf;bY=46*sf;}const cY=bY-h/2,hW=w/2,hH=h/2;let tx,ty;if(Math.random()<0.7||tier==='candle'||tier==='flame'){const p=2*(w+h),e=Math.random()*p;if(e<w){tx=-hW+e;ty=cY-hH;}else if(e<w+h){tx=hW;ty=cY-hH+(e-w);}else if(e<2*w+h){tx=hW-(e-w-h);ty=cY+hH;}else{tx=-hW;ty=cY+hH-(e-2*w-h);}tx+=(Math.random()-0.5)*4*sf;ty+=(Math.random()-0.5)*4*sf;}else{tx=(Math.random()-0.5)*w*0.75;ty=cY+(Math.random()-0.5)*h*0.7;}return{x:cx+tx,y:cy+ty};}
            function edgeStart(cx,cy){const s=Math.floor(Math.random()*4),m=50;if(s===0)return{x:-m-Math.random()*300,y:(Math.random()-0.5)*2*(cy+m)};if(s===1)return{x:CW+m+Math.random()*300,y:(Math.random()-0.5)*2*(cy+m)};if(s===2)return{x:(Math.random()-0.5)*2*(cx+m),y:-m-Math.random()*300};return{x:(Math.random()-0.5)*2*(cx+m),y:CH+m+Math.random()*300};}
            function spawnParticles(){particles=[];const cx=CW/2,cy=CH/2,ww=innerWidth,con=navigator.hardwareConcurrency||4;let cnt,sf;if(ww<=380){cnt=con<=2?30:42;sf=0.48;}else if(ww<=480){cnt=con<=2?40:52;sf=0.55;}else if(ww<=768){cnt=con<=2?55:68;sf=0.72;}else{cnt=con<=2?65:80;sf=0.88;}const probs=[{t:'tier1',p:0.38},{t:'tier2',p:0.28},{t:'tier3',p:0.22},{t:'candle',p:0.08},{t:'flame',p:0.04}];for(let i=0;i<cnt;i++){let r=Math.random(),tier='tier1',cum=0;for(const tp of probs){cum+=tp.p;if(r<=cum){tier=tp.t;break;}}const txt=(tierSnippets[tier]||tierSnippets.tier1)[Math.floor(Math.random()*tierSnippets[tier].length)];const s=edgeStart(cx,cy),t=cakeTarget(tier,cx,cy,sf);particles.push({text:txt,fontSize:9+Math.random()*12,sx:s.x,sy:s.y,tx:t.x,ty:t.y,delay:Math.random()*0.7,dur:1.8+Math.random()*1.4,cx:s.x,cy:s.y,sc:1.2,alpha:0,glow:0});}}
            function cubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
            function draw(ts){if(phase==='idle'){animId=null;return;}ctx.clearRect(0,0,CW,CH);const elapsed=ts-phaseStart;let allDone=true;ctx.textAlign='center';ctx.textBaseline='middle';for(const p of particles){if(phase==='flying'){const le=elapsed-p.delay*1000;if(le<=0){p.cx=p.sx;p.cy=p.sy;p.sc=1.2;p.alpha=0;allDone=false;continue;}const prog=Math.min(1,le/(p.dur*1000)),e=cubic(prog);p.cx=p.sx+(p.tx-p.sx)*e;p.cy=p.sy+(p.ty-p.sy)*e;p.sc=1.2-prog*0.2;p.alpha=prog<0.1?(prog/0.1)*0.85:0.85;p.glow=0.5+prog*0.5;if(prog<1)allDone=false;}else if(phase==='holding'){p.cx=p.tx;p.cy=p.ty;p.sc=1.0;p.alpha=0.85;p.glow=0.9;if(elapsed<1500)allDone=false;}else if(phase==='dissolving'){const prog=Math.min(1,elapsed/800),e=1-(1-prog)*(1-prog);p.cx=p.tx;p.cy=p.ty;p.sc=1.0+e*0.7;p.alpha=0.85*(1-e);p.glow=0.9+e*1.5;if(prog<1)allDone=false;}if(p.alpha>0.003){const ga=Math.min(1,p.glow)*p.alpha;ctx.shadowColor=`rgba(30,255,142,${ga})`;ctx.shadowBlur=5+p.glow*7;const R=Math.min(255,160+p.glow*60),G=255,B=Math.min(255,176+p.glow*30);ctx.fillStyle=`rgba(${R},${G},${B},${Math.max(0,Math.min(1,p.alpha))})`;ctx.font=`500 ${p.fontSize*p.sc}px "Courier New",monospace`;ctx.fillText(p.text,p.cx,p.cy);}}ctx.shadowColor='transparent';ctx.shadowBlur=0;if(allDone){if(phase==='flying'){phase='holding';phaseStart=ts;}else if(phase==='holding'){phase='dissolving';phaseStart=ts;}else if(phase==='dissolving'){ctx.clearRect(0,0,CW,CH);canvas.classList.remove('active');phase='idle';particles=[];animId=null;if(onDone){const cb=onDone;onDone=null;requestAnimationFrame(()=>requestAnimationFrame(cb));}return;}}animId=requestAnimationFrame(draw);}
            function launchParticles(cb){resizeCanvas();spawnParticles();phase='flying';phaseStart=performance.now();canvas.classList.add('active');if(animId)cancelAnimationFrame(animId);animId=requestAnimationFrame(draw);onDone=cb;}

            // ---- 流程控制 ----
            let busy=false,step=0,envelopeOpened=false;
            function showSkip(){D.skipBtn.classList.add('visible');} function hideSkip(){D.skipBtn.classList.remove('visible');}
            function skipToCake(){if(busy&&step<4)return;if(animId)cancelAnimationFrame(animId);stopMeteors();canvas.classList.remove('active');phase='idle';particles=[];D.home.classList.add('hidden');D.envLayer.style.opacity='0';D.envLayer.style.transform='translate(-50%,-50%) scale(0.78)';D.letter.classList.remove('show');D.letter.style.visibility='hidden';D.msgLayer.classList.remove('show');D.msgLayer.style.opacity='0';D.starScene.classList.add('show');D.morph.classList.remove('show');D.cake.classList.add('show');D.cheer.classList.add('show');playSong();setTimeout(()=>D.cheer.classList.remove('show'),TIMING.CHEER_DURATION);hideSkip();step=5;busy=false;}
            D.skipBtn.addEventListener('click',skipToCake);

            D.openBtn.addEventListener('click',()=>{if(busy)return;busy=true;D.home.classList.add('hidden');setTimeout(()=>{D.envLayer.classList.add('show');busy=false;step=1;showSkip();},TIMING.ENVELOPE_SHOW_DELAY);});
            function openEnvelope(){if(busy||step!==1||envelopeOpened)return;envelopeOpened=true;busy=true;D.seal.classList.add('bouncing');setTimeout(()=>D.seal.classList.remove('bouncing'),400);D.envLayer.classList.add('shake');setTimeout(()=>D.envLayer.classList.remove('shake'),350);setTimeout(()=>D.flap.classList.add('open'),TIMING.FLAP_OPEN_DELAY);
                // 信封在信纸开始升起时立即消失
                setTimeout(()=>{
                    D.envLayer.style.transition = 'opacity 0.45s ease';
                    D.envLayer.style.opacity = '0';
                    D.envLayer.style.transform = 'translate(-50%,-50%) scale(0.78)';
                }, TIMING.LETTER_RISE_DELAY);
                setTimeout(()=>D.letter.classList.add('show'),TIMING.LETTER_RISE_DELAY);
                step=2;
                const onEnd=()=>{
                    D.starScene.classList.add('show'); D.msgLayer.classList.add('show');
                    startMeteors(); step=3; busy=false;
                    D.letter.removeEventListener('animationend',onEnd);
                };
                D.letter.addEventListener('animationend',onEnd,{once:true});
                setTimeout(()=>{if(step===2){D.starScene.classList.add('show');D.msgLayer.classList.add('show');startMeteors();step=3;busy=false;}},TIMING.LETTER_FALLBACK_TIMEOUT);
            }
            D.envelope.addEventListener('click',openEnvelope);
            D.envelope.addEventListener('keydown',(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openEnvelope();}});

            D.claimBtn.addEventListener('click',()=>{if(busy||step!==3)return;busy=true;D.claimBtn.classList.add('disabled');D.msgLayer.style.opacity='0';D.msgLayer.style.transition='opacity 0.55s ease';hideSkip();setTimeout(()=>{D.msgLayer.classList.remove('show');D.msgLayer.style.opacity='';D.msgLayer.style.transition='';step=4;launchParticles(()=>{D.morph.classList.add('show');stopMeteors();setTimeout(()=>{D.morph.classList.remove('show');requestAnimationFrame(()=>{D.cake.classList.add('show');D.cheer.classList.add('show');playSong();setTimeout(()=>D.cheer.classList.remove('show'),TIMING.CHEER_DURATION);step=5;busy=false;});},TIMING.MORPH_DURATION);});},TIMING.MSG_FADE_DELAY);});

            function init(){initStars();resizeCanvas();ctx.textAlign='center';ctx.textBaseline='middle';}
            window.addEventListener('resize',()=>{resizeCanvas();if(phase!=='idle')spawnParticles();});
            window.addEventListener('beforeunload',()=>{if(animId)cancelAnimationFrame(animId);if(meteorTimer)clearInterval(meteorTimer);});
            init();
        })();
    </script>
</body>
</html>
